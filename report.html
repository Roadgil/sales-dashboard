<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대표님 보고용 리포트 (Sales Progress)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { background-color: #f1f5f9; font-family: 'Arial', sans-serif; }
    .excel-container { overflow-x: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;}
    .excel-table { border-collapse: collapse; white-space: nowrap; width: max-content; }
    
    /* ✨ 칸 너비 다이어트 및 패딩 축소 */
    .excel-table th, .excel-table td { 
        border: 1px solid #94a3b8; 
        padding: 4px 6px; 
        font-size: 11px; 
        text-align: right; 
    }
    .excel-table th { background-color: #dbeafe; color: #1e293b; font-weight: bold; text-align: center; }
    .excel-table .header-dark { background-color: #1e293b; color: white; border-color: #334155; }
    .text-left { text-align: left !important; }
    .text-center { text-align: center !important; }
    
    /* 컬러 포인트 */
    .bg-yellow { background-color: #fef9c3 !important; }
    .bg-blue { background-color: #e0f2fe !important; }
    .bg-red-light { background-color: #fee2e2 !important; }
    .text-red { color: #dc2626 !important; font-weight: bold; }
    .text-blue { color: #2563eb !important; font-weight: bold; }
    .font-bold { font-weight: bold !important; }
    
    /* ✨ 주차별 칸과 인풋 박스 최적화 */
    .col-week { width: 38px; min-width: 38px; max-width: 45px; }
    .col-total { width: 45px; font-weight: bold; background-color: #fef9c3 !important; color: #1e40af; }
    .col-prog { width: 40px; font-weight: bold; color: #047857; background-color: #ecfdf5 !important; }
    
    input.week-input {
        width: 100%;
        text-align: center;
        font-size: 10px;
        padding: 1px 0;
        margin-bottom: 2px;
        border: 1px solid #cbd5e1;
        border-radius: 2px;
        color: #0f172a;
    }
    input.week-input:focus { border-color: #3b82f6; outline: none; }

    ::-webkit-scrollbar { height: 10px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDpdX6I7fkE1m9jQDARg5l4Skv3vhD7iyI",
      authDomain: "sales-dashboard-d0d13.firebaseapp.com",
      projectId: "sales-dashboard-d0d13",
      storageBucket: "sales-dashboard-d0d13.firebasestorage.app",
      messagingSenderId: "870275096697",
      appId: "1:870275096697:web:cd7373b77358681e21b4a8",
      measurementId: "G-K5G6BMNBX9"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const { useState, useEffect } = React;

    const ReportApp = () => {
      const SECRET_PASSWORD = "candelakoreasales"; 
      const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('adminAuth') === 'true');
      const [pwdInput, setPwdInput] = useState('');

      const [quarters, setQuarters] = useState(['2026 Q1', '2026 Q2']);
      const [selectedQuarter, setSelectedQuarter] = useState('2026 Q2');
      const [salesData, setSalesData] = useState([]);
      const [quarterTargets, setQuarterTargets] = useState({});
      const [memberTargets, setMemberTargets] = useState({});
      const [teams, setTeams] = useState({
        'Team 1': ['Kim SH', 'Oh SG'],
        'Team 2': ['Baek SC', 'Lee GR'],
        'Team 3': ['YC lim']
      });

      // ✨ 상단 날짜 기입용 State (Firebase 연동)
      const [weekHeaders, setWeekHeaders] = useState({});

      const handleLogin = (e) => {
        e.preventDefault();
        if (pwdInput === SECRET_PASSWORD) {
          localStorage.setItem('adminAuth', 'true'); setIsLoggedIn(true);
        } else {
          alert('비밀번호 불일치!'); setPwdInput('');
        }
      };

      useEffect(() => {
        if (!isLoggedIn) return; 
        const unsubSales = db.collection("sales").onSnapshot((snap) => setSalesData(snap.docs.map(doc => doc.data())));
        const unsubQTarget = db.collection("targets").doc("quarterTargets").onSnapshot((doc) => { if(doc.exists) setQuarterTargets(doc.data()); });
        const unsubMTarget = db.collection("targets").doc("memberTargets").onSnapshot((doc) => { if(doc.exists) setMemberTargets(doc.data()); });
        const unsubLayout = db.collection("settings").doc("layout").onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            if (data.teams) setTeams(data.teams);
            if (data.quarters) setQuarters(data.quarters);
          }
        });
        
        // ✨ 날짜 헤더 불러오기
        const unsubReport = db.collection("settings").doc("report").onSnapshot((doc) => {
          if (doc.exists) setWeekHeaders(doc.data().weekHeaders || {});
        });

        return () => { unsubSales(); unsubQTarget(); unsubMTarget(); unsubLayout(); unsubReport(); };
      }, [isLoggedIn]);

      // ✨ 날짜 헤더 저장 함수 (타이핑 시 파이어베이스로 실시간 전송)
      const handleWeekHeaderChange = (key, value) => {
        const newHeaders = { ...weekHeaders, [key]: value };
        setWeekHeaders(newHeaders);
        db.collection("settings").doc("report").set({ weekHeaders: newHeaders }, { merge: true });
      };

      if (!isLoggedIn) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-800">
            <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full">
              <h2 className="text-xl font-bold mb-4">📈 보고용 리포트 보안접속</h2>
              <input type="password" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} className="w-full p-3 border rounded-lg mb-4 text-center tracking-widest font-mono" placeholder="Password" />
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition">접속하기</button>
            </form>
          </div>
        );
      }

      // 월별 및 주차별 분류 로직
      const qStr = selectedQuarter.split(' ')[1] || 'Q1';
      let m1=1, m2=2, m3=3;
      let m1Name='Jan', m2Name='Feb', m3Name='Mar';
      if(qStr === 'Q2') { m1=4; m2=5; m3=6; m1Name='Apr'; m2Name='May'; m3Name='Jun'; }
      if(qStr === 'Q3') { m1=7; m2=8; m3=9; m1Name='Jul'; m2Name='Aug'; m3Name='Sep'; }
      if(qStr === 'Q4') { m1=10; m2=11; m3=12; m1Name='Oct'; m2Name='Nov'; m3Name='Dec'; }

      const getMonthIdx = (dStr) => {
        if(!dStr) return -1;
        const m = parseInt(dStr.split('-')[1], 10);
        return isNaN(m) ? -1 : m;
      };
      
      const getWeekIdx = (dStr) => {
        if(!dStr) return 0;
        const d = parseInt(dStr.split('-')[2], 10);
        if(isNaN(d)) return 0;
        if(d <= 7) return 1;
        if(d <= 14) return 2;
        if(d <= 21) return 3;
        if(d <= 28) return 4;
        return 5;
      };

      // 백만원(M) 단위 변환 (소수점 1자리까지)
      const toM = (val) => val / 1000000;
      const formatM = (val) => val === 0 ? '' : val.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
      const formatP = (val) => (val * 100).toFixed(1) + '%';

      const currentQData = salesData.filter(d => d.quarter === selectedQuarter && (d.status === 'FCST' || d.status === 'ACT'));

      let rows = [];
      // ✨ Team 1부터 오름차순 정렬 로직 확실하게 적용
      Object.entries(teams).sort(([a], [b]) => a.localeCompare(b)).forEach(([team, members]) => {
        members.forEach(member => {
          const mData = currentQData.filter(d => d.member === member);
          
          const calcMonth = (m) => mData.filter(d => getMonthIdx(d.deliveryDate) === m).reduce((a,b)=>a+toM(b.priceKRW),0);
          const calcWeek = (m, w) => mData.filter(d => getMonthIdx(d.deliveryDate) === m && getWeekIdx(d.deliveryDate) === w).reduce((a,b)=>a+toM(b.priceKRW),0);

          const valM1 = calcMonth(m1);
          const valM2 = calcMonth(m2);
          const valM3 = calcMonth(m3);
          
          // ✨ TBD 삭제하고 M1+M2+M3 합계만 사용
          const total = valM1 + valM2 + valM3;
          const budget = toM(memberTargets[member] || 0);
          const gap = budget - total; 
          const progress = budget ? total / budget : 0;

          const weeksM1 = [calcWeek(m1,1), calcWeek(m1,2), calcWeek(m1,3), calcWeek(m1,4), calcWeek(m1,5)];
          const weeksM2 = [calcWeek(m2,1), calcWeek(m2,2), calcWeek(m2,3), calcWeek(m2,4), calcWeek(m2,5)];
          const weeksM3 = [calcWeek(m3,1), calcWeek(m3,2), calcWeek(m3,3), calcWeek(m3,4), calcWeek(m3,5)];

          rows.push({
            team, member, valM1, valM2, valM3, total, budget, gap, progress,
            weeksM1, weeksM2, weeksM3
          });
        });
      });

      // 총 합계 계산
      const sumM1 = rows.reduce((a,b)=>a+b.valM1,0);
      const sumM2 = rows.reduce((a,b)=>a+b.valM2,0);
      const sumM3 = rows.reduce((a,b)=>a+b.valM3,0);
      const sumTotal = rows.reduce((a,b)=>a+b.total,0);
      
      const currentTargets = quarterTargets[selectedQuarter] || {};
      const sumBudget = toM(currentTargets.target || 0);
      const sumGap = sumBudget - sumTotal;
      const sumProgress = sumBudget ? sumTotal / sumBudget : 0;

      const sumWeeksM1 = [1, 2].map(i => rows.reduce((a,b)=>a+b.weeksM1[i-1], 0));
      const sumWeeksM2 = [1, 2].map(i => rows.reduce((a,b)=>a+b.weeksM2[i-1], 0));
      const sumWeeksM3 = [1, 2].map(i => rows.reduce((a,b)=>a+b.weeksM3[i-1], 0));

      const allProducts = ['GMPP', 'Picoway', 'Cryo7', 'VBP', 'Hand Piece', 'Nordlys', 'Nordlys Mini', 'GMP'];
      const productCounts = {};
      allProducts.forEach(p => productCounts[p] = { count: 0 });
      currentQData.forEach(d => {
        if(productCounts[d.product]) productCounts[d.product].count += 1;
      });

      const ordinals = ["1st", "2nd", "3rd", "4th", "5th"];

      return (
        <div className="p-6 md:p-8">
          <div className="flex justify-between items-end mb-6">
            <div>
              <h1 className="text-2xl font-extrabold text-slate-800">Monthly Sales Progress Check</h1>
              <p className="text-slate-500 text-sm font-bold mt-1">Candela Korea - Capital Sales Only <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded ml-2">(Unit: M₩)</span></p>
            </div>
            <div className="flex gap-3">
              <select value={selectedQuarter} onChange={(e) => setSelectedQuarter(e.target.value)} className="px-4 py-2 border-2 border-slate-400 rounded-lg font-bold outline-none cursor-pointer hover:border-blue-500 transition">
                {quarters.map(q => <option key={q} value={q}>{q}</option>)}
              </select>
              <button onClick={() => window.close()} className="bg-slate-300 hover:bg-slate-400 text-slate-800 px-4 py-2 rounded-lg font-bold transition">닫기</button>
            </div>
          </div>

          <div className="excel-container">
            <table className="excel-table">
              <thead>
                <tr>
                  <th rowSpan="2" className="text-left w-16 align-middle">Team</th>
                  <th rowSpan="2" className="text-left w-20 align-middle">Sales Reps</th>
                  <th rowSpan="2" className="w-10 text-center align-middle">{m1Name}</th>
                  <th rowSpan="2" className="w-10 text-center align-middle">{m2Name}</th>
                  <th rowSpan="2" className="w-10 text-center align-middle">{m3Name}</th>
                  
                  <th rowSpan="2" className="col-total text-center align-middle">Q Total</th>
                  <th rowSpan="2" className="w-12 text-center bg-blue align-middle">Q Budget</th>
                  <th rowSpan="2" className="w-12 text-center align-middle">%</th>
                  <th rowSpan="2" className="w-14 text-center bg-red-light text-red align-middle">Gap</th>
                  
                  {/* ✨ Progress 섹션 헤더 (각각 7칸으로 확장됨) */}
                  <th colSpan="7" className="header-dark">{m1Name} Progress</th>
                  <th colSpan="7" className="header-dark bg-slate-700">{m2Name} Progress</th>
                  <th colSpan="7" className="header-dark bg-slate-600">{m3Name} Progress</th>
                </tr>
                <tr>
                  {/* ✨ M1: 1~5주차 인풋 박스 + Total + Prog */}
                  {[1, 2].map(w => (
                    <th key={'h1'+w} className="font-normal col-week text-center align-middle">
                      <input type="text" value={weekHeaders[`m1w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m1w${w}`, e.target.value)} className="week-input" placeholder="날짜" />
                      <div className="font-bold text-[10px] leading-none">{ordinals[w-1]}</div>
                    </th>
                  ))}
                  <th className="col-total align-bottom text-center">Total</th>
                  <th className="col-prog align-bottom text-center">Prog.</th>

                  {/* ✨ M2: 1~5주차 인풋 박스 + Total + Prog */}
                  {[1, 2].map(w => (
                    <th key={'h2'+w} className="font-normal col-week text-center align-middle">
                      <input type="text" value={weekHeaders[`m2w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m2w${w}`, e.target.value)} className="week-input" placeholder="날짜" />
                      <div className="font-bold text-[10px] leading-none">{ordinals[w-1]}</div>
                    </th>
                  ))}
                  <th className="col-total align-bottom text-center">Total</th>
                  <th className="col-prog align-bottom text-center">Prog.</th>

                  {/* ✨ M3: 1~5주차 인풋 박스 + Total + Prog */}
                  {[1, 2].map(w => (
                    <th key={'h3'+w} className="font-normal col-week text-center align-middle">
                      <input type="text" value={weekHeaders[`m3w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m3w${w}`, e.target.value)} className="week-input" placeholder="날짜" />
                      <div className="font-bold text-[10px] leading-none">{ordinals[w-1]}</div>
                    </th>
                  ))}
                  <th className="col-total align-bottom text-center">Total</th>
                  <th className="col-prog align-bottom text-center">Prog.</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className="hover:bg-slate-50 transition">
                    <td className="text-left text-slate-500 font-bold">{r.team}</td>
                    <td className="text-left font-bold text-[12px]">{r.member}</td>
                    <td className={r.valM1 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM1)}</td>
                    <td className={r.valM2 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM2)}</td>
                    <td className={r.valM3 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM3)}</td>
                    <td className="col-total">{formatM(r.total)}</td>
                    <td className="bg-blue font-bold text-slate-600">{formatM(r.budget)}</td>
                    <td className="text-blue font-bold">{formatP(r.progress)}</td>
                    <td className="bg-red-light text-red">{r.gap === 0 ? '' : formatM(r.gap)}</td>
                    
                    {/* M1 Weeks & Progress */}
                    {r.weeksM1.map((w, idx) => <td key={'m1'+idx} className={w ? 'text-slate-800 font-bold' : ''}>{formatM(w)}</td>)}
                    <td className="col-total">{formatM(r.valM1)}</td>
                    <td className="col-prog">{formatP(r.budget ? r.valM1 / r.budget : 0)}</td>
                    
                    {/* M2 Weeks & Progress */}
                    {r.weeksM2.map((w, idx) => <td key={'m2'+idx} className={w ? 'text-slate-800 font-bold' : ''}>{formatM(w)}</td>)}
                    <td className="col-total">{formatM(r.valM2)}</td>
                    <td className="col-prog">{formatP(r.budget ? r.valM2 / r.budget : 0)}</td>

                    {/* M3 Weeks & Progress */}
                    {r.weeksM3.map((w, idx) => <td key={'m3'+idx} className={w ? 'text-slate-800 font-bold' : ''}>{formatM(w)}</td>)}
                    <td className="col-total">{formatM(r.valM3)}</td>
                    <td className="col-prog">{formatP(r.budget ? r.valM3 / r.budget : 0)}</td>
                  </tr>
                ))}
                
                {/* TOTAL ROW */}
                <tr className="header-dark font-bold text-[12px]">
                  <td colSpan="2" className="text-center tracking-widest">TOTAL</td>
                  <td>{formatM(sumM1)}</td>
                  <td>{formatM(sumM2)}</td>
                  <td>{formatM(sumM3)}</td>
                  
                  <td className="text-yellow-300">{formatM(sumTotal)}</td>
                  <td className="text-blue-300">{formatM(sumBudget)}</td>
                  <td className="text-green-300">{formatP(sumProgress)}</td>
                  <td className="text-red-300">{formatM(sumGap)}</td>

                  {/* M1 Total & Progress */}
                  {sumWeeksM1.map((w, idx) => <td key={'sm1'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM1)}</td>
                  <td className="text-green-300">{formatP(sumBudget ? sumM1 / sumBudget : 0)}</td>
                  
                  {/* M2 Total & Progress */}
                  {sumWeeksM2.map((w, idx) => <td key={'sm2'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM2)}</td>
                  <td className="text-green-300">{formatP(sumBudget ? sumM2 / sumBudget : 0)}</td>

                  {/* M3 Total & Progress */}
                  {sumWeeksM3.map((w, idx) => <td key={'sm3'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM3)}</td>
                  <td className="text-green-300">{formatP(sumBudget ? sumM3 / sumBudget : 0)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div className="excel-container w-full md:w-1/3">
            <table className="excel-table w-full">
              <thead>
                <tr>
                  <th colSpan="2" className="header-dark bg-slate-600">System Required (# of unit)</th>
                </tr>
                <tr>
                  <th className="text-left w-1/2">Product</th>
                  <th className="w-1/2">Sales Count</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(productCounts).sort((a,b)=>b[1].count - a[1].count).map(([p, data]) => (
                  <tr key={p}>
                    <td className="text-left font-bold">{p}</td>
                    <td className="font-bold text-blue-600">{data.count > 0 ? `${data.count} 대` : '-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReportApp />);
  </script>
</body>
</html>
