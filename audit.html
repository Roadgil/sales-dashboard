<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Log · Candela Korea</title>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --bg:#f4f5f7; --surf:#fff; --border:#e4e6eb;
  --a1:#5b4fcf; --green:#0fa878; --red:#e84d6f; --yellow:#e09c10; --blue:#2563eb;
  --text:#1a1a2e; --muted:#8a8fa8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh;}

/* ── 로그인 ── */
.login-wrap{display:flex;height:100vh;align-items:center;justify-content:center;background:#0f172a;}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
.login-icon{font-size:36px;margin-bottom:12px;}
.login-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:24px;font-family:'DM Mono',monospace;}
.login-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-family:'DM Mono',monospace;letter-spacing:4px;text-align:center;outline:none;margin-bottom:8px;transition:border .2s;}
.login-input:focus{border-color:var(--a1);}
.login-input.error{border-color:var(--red);}
.login-err{font-size:12px;color:var(--red);font-weight:700;margin-bottom:10px;min-height:18px;}
.login-btn{width:100%;padding:12px;background:var(--a1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
.login-btn:hover{background:#4a3fb8;}

/* ── 레이아웃 ── */
.wrap{max-width:1400px;margin:0 auto;padding:32px 24px;}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border);}
h1{font-family:'DM Serif Display',serif;font-size:32px;font-weight:400;line-height:1;margin-bottom:4px;}
h1 span{color:var(--a1);}
.sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:20px;transition:all .2s;margin-bottom:10px;}
.back-link:hover{color:var(--a1);border-color:var(--a1);}

/* ── 필터 바 ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-bar select, .filter-bar input{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:#fff;outline:none;transition:border .2s;cursor:pointer;}
.filter-bar select:focus, .filter-bar input:focus{border-color:var(--a1);}
.filter-bar input{min-width:200px;}
.btn-reset{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--muted);transition:all .2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}

/* ── 통계 카드 ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.s-create::before{background:var(--green);}
.stat-card.s-edit::before{background:var(--yellow);}
.stat-card.s-delete::before{background:var(--red);}
.stat-card.s-total::before{background:var(--a1);}
.stat-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.stat-val{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;}
.stat-val.c-create{color:var(--green);}
.stat-val.c-edit{color:var(--yellow);}
.stat-val.c-delete{color:var(--red);}
.stat-val.c-total{color:var(--a1);}

/* ── 로그 테이블 ── */
.table-wrap{background:var(--surf);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#1e3a8a;}
th{font-family:'DM Mono',monospace;font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:1px;padding:11px 12px;text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.mono{font-family:'DM Mono',monospace;font-size:11px;}

/* ── Action 배지 ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;}
.badge-create{background:rgba(15,168,120,.12);color:var(--green);}
.badge-edit{background:rgba(224,156,16,.12);color:var(--yellow);}
.badge-delete{background:rgba(232,77,111,.12);color:var(--red);}

/* ── diff 뷰 ── */
.diff-btn{padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--muted);transition:all .2s;}
.diff-btn:hover{border-color:var(--a1);color:var(--a1);}
.diff-panel{display:none;margin-top:8px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;font-family:'DM Mono',monospace;}
.diff-panel.open{display:block;}
.diff-row{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid #eef0f4;}
.diff-row:last-child{border-bottom:none;}
.diff-field{color:var(--muted);min-width:90px;flex-shrink:0;}
.diff-before{color:var(--red);text-decoration:line-through;flex:1;}
.diff-after{color:var(--green);flex:1;}
.diff-same{color:var(--text);flex:1;}

/* ── 페이지네이션 ── */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap;}
.pg-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .2s;}
.pg-btn:hover{border-color:var(--a1);color:var(--a1);}
.pg-btn.active{background:var(--a1);border-color:var(--a1);color:#fff;}
.pg-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── 로딩 ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{margin-top:28px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">Audit <span style="color:var(--a1)">Log</span></div>
    <div class="login-sub">Candela Korea · 변경 이력 뷰어</div>
    <input type="email" class="login-input" id="emailInput" placeholder="Email" onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:8px"/>
    <input type="password" class="login-input" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">접속하기</button>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div class="wrap" id="mainWrap" style="display:none">
  <a class="back-link" href="index.html">← Dashboard로 돌아가기</a>
  <header>
    <div>
      <h1>Audit <span>Log</span></h1>
      <div class="sub">Candela Korea · 데이터 변경 이력</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)" id="lastUpdated">--</div>
      <button onclick="doLogout()" style="margin-top:8px;padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--muted);">로그아웃</button>
    </div>
  </header>

  <!-- 통계 카드 -->
  <div class="stats-row">
    <div class="stat-card s-total"><div class="stat-label">Total Logs</div><div class="stat-val c-total" id="st-total">-</div></div>
    <div class="stat-card s-create"><div class="stat-label">신규 저장</div><div class="stat-val c-create" id="st-create">-</div></div>
    <div class="stat-card s-edit"><div class="stat-label">수정</div><div class="stat-val c-edit" id="st-edit">-</div></div>
    <div class="stat-card s-delete"><div class="stat-label">삭제</div><div class="stat-val c-delete" id="st-delete">-</div></div>
  </div>

  <!-- 필터 바 -->
  <div class="filter-bar">
    <select id="fAction" onchange="applyFilters()">
      <option value="">전체 액션</option>
      <option value="create">신규 저장</option>
      <option value="edit">수정</option>
      <option value="delete">삭제</option>
    </select>
    <select id="fMember" onchange="applyFilters()">
      <option value="">전체 담당자</option>
    </select>
    <select id="fQuarter" onchange="applyFilters()">
      <option value="">전체 분기</option>
    </select>
    <input type="text" id="fSearch" placeholder="🔍  Account / 제품 검색..." oninput="applyFilters()"/>
    <button class="btn-reset" onclick="resetFilters()">초기화</button>
    <span class="count-badge" id="countBadge">-- 건</span>
  </div>

  <!-- 로그 테이블 -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:150px">시각</th>
            <th style="width:80px">액션</th>
            <th>변경자</th>
            <th>담당자</th>
            <th>분기</th>
            <th>Account</th>
            <th>제품</th>
            <th>상태</th>
            <th style="text-align:right">금액 (KRW)</th>
            <th style="width:70px">변경내역</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="10"><div class="loading"><div class="spinner"></div>Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>

  <footer>
    <span>Source: Firebase Firestore · audit_logs collection</span>
    <span>Candela Korea Sales Ops</span>
  </footer>
</div>

<script>
const PAGE_SIZE       = 30;

// ── Firebase ──────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDpdX6I7fkE1m9jQDARg5l4Skv3vhD7iyI",
  authDomain: "sales-dashboard-d0d13.firebaseapp.com",
  projectId: "sales-dashboard-d0d13",
  storageBucket: "sales-dashboard-d0d13.firebasestorage.app",
  messagingSenderId: "870275096697",
  appId: "1:870275096697:web:cd7373b77358681e21b4a8"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ── 로그인 (Firebase Auth) ─────────────────────────────────────────────────
let logsLoaded = false;
function showLoginError(msg) {
  const inp = document.getElementById('pwdInput');
  inp.classList.add('error');
  document.getElementById('loginErr').textContent = msg;
  inp.value = '';
  setTimeout(() => { inp.classList.remove('error'); document.getElementById('loginErr').textContent = ''; }, 2500);
}
function doLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pwd   = document.getElementById('pwdInput').value;
  if (!email || !pwd) { showLoginError('❌ 이메일과 비밀번호를 입력하세요.'); return; }
  auth.signInWithEmailAndPassword(email, pwd)
    .catch(() => showLoginError('❌ 이메일 또는 비밀번호가 올바르지 않습니다.'));
}
function doLogout() {
  auth.signOut().then(() => location.reload());
}
const AUDIT_VIEWER_EMAILS = ['hannap@candelamedical.com','yunap@candelamedical.com','miaej@candelamedical.com','yoongil.chae@candelamedical.com','bohyunk@candelamedical.com'];
auth.onAuthStateChanged(user => {
  if (user) {
    if (!AUDIT_VIEWER_EMAILS.includes((user.email||'').toLowerCase())) {
      auth.signOut();
      showLoginError('⛔ 감사 로그 열람 권한이 없는 계정입니다.');
      return;
    }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainWrap').style.display  = 'block';
    if (!logsLoaded) { logsLoaded = true; loadLogs(); }
  } else {
    document.getElementById('loginWrap').style.display = '';
    document.getElementById('mainWrap').style.display  = 'none';
  }
});

// ── 데이터 ───────────────────────────────────────────────────────────────
let allLogs = [];
let filtered = [];
let currentPage = 1;

function loadLogs() {
  db.collection("audit_logs")
    .orderBy("timestamp", "desc")
    .onSnapshot(snap => {
      allLogs = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      buildFilterOptions();
      applyFilters();
      updateStats();
      const el = document.getElementById('lastUpdated');
      if (el) el.textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    }, err => {
      // orderBy 인덱스 없을 경우 fallback
      db.collection("audit_logs").get().then(snap => {
        allLogs = snap.docs.map(d => ({ _id: d.id, ...d.data() }))
          .sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
        buildFilterOptions();
        applyFilters();
        updateStats();
      });
    });
}

function buildFilterOptions() {
  const members  = [...new Set(allLogs.map(l => l.member).filter(Boolean))].sort();
  const quarters = [...new Set(allLogs.map(l => l.quarter).filter(Boolean))].sort().reverse();

  const fMember = document.getElementById('fMember');
  const cur = fMember.value;
  fMember.innerHTML = '<option value="">전체 담당자</option>' +
    members.map(m => `<option value="${m}">${m}</option>`).join('');
  fMember.value = cur;

  const fQuarter = document.getElementById('fQuarter');
  const curQ = fQuarter.value;
  fQuarter.innerHTML = '<option value="">전체 분기</option>' +
    quarters.map(q => `<option value="${q}">${q}</option>`).join('');
  fQuarter.value = curQ;
}

function updateStats() {
  document.getElementById('st-total').textContent  = allLogs.length;
  document.getElementById('st-create').textContent = allLogs.filter(l=>l.action==='create').length;
  document.getElementById('st-edit').textContent   = allLogs.filter(l=>l.action==='edit').length;
  document.getElementById('st-delete').textContent = allLogs.filter(l=>l.action==='delete').length;
}

function applyFilters() {
  const action  = document.getElementById('fAction').value;
  const member  = document.getElementById('fMember').value;
  const quarter = document.getElementById('fQuarter').value;
  const search  = document.getElementById('fSearch').value.toLowerCase().trim();

  filtered = allLogs.filter(l => {
    if (action  && l.action  !== action)  return false;
    if (member  && l.member  !== member)  return false;
    if (quarter && l.quarter !== quarter) return false;
    if (search) {
      const hay = [l.account, l.member, (l.after||l.before||{}).product, (l.after||l.before||{}).status].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('countBadge').textContent = `${filtered.length}건`;
  currentPage = 1;
  renderTable();
  renderPagination();
}

function resetFilters() {
  document.getElementById('fAction').value  = '';
  document.getElementById('fMember').value  = '';
  document.getElementById('fQuarter').value = '';
  document.getElementById('fSearch').value  = '';
  applyFilters();
}

// ── 렌더 ─────────────────────────────────────────────────────────────────
const ACTION_LABEL = { create:'신규 저장', edit:'수정', delete:'삭제' };
const ACTION_BADGE = { create:'badge-create', edit:'badge-edit', delete:'badge-delete' };
const ACTION_ICON  = { create:'✚', edit:'✎', delete:'✕' };

function fmtTime(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    const ymd = d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });
    const hms = d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    return `<span style="display:block">${ymd}</span><span class="mono" style="color:var(--muted);font-size:10px">${hms}</span>`;
  } catch { return iso; }
}

function fmtKRW(v) {
  if (!v) return '-';
  return '₩ ' + Number(v).toLocaleString();
}

const DIFF_FIELDS = [
  { key:'status',       label:'Status' },
  { key:'priceKRW',     label:'금액(KRW)' },
  { key:'deliveryDate', label:'납품예정일' },
  { key:'contractDate', label:'계약일' },
  { key:'account',      label:'Account' },
  { key:'product',      label:'제품' },
  { key:'accType',      label:'Acc type' },
  { key:'dealerName',   label:'Dealer' },
  { key:'contractType', label:'계약구분' },
  { key:'so',           label:'SO' },
];

function buildDiff(before, after) {
  if (!before && !after) return '';
  const b = before || {};
  const a = after  || {};
  const rows = DIFF_FIELDS.map(f => {
    const bv = String(b[f.key] ?? '');
    const av = String(a[f.key] ?? '');
    if (bv === av) return null; // 변경 없으면 생략
    return `<div class="diff-row">
      <span class="diff-field">${f.label}</span>
      <span class="diff-before">${bv || '(없음)'}</span>
      <span style="color:var(--muted);padding:0 4px">→</span>
      <span class="diff-after">${av || '(없음)'}</span>
    </div>`;
  }).filter(Boolean);
  if (!rows.length) return '<div style="color:var(--muted);font-size:11px;padding:4px 0">변경된 필드 없음</div>';
  return rows.join('');
}

function toggleDiff(id) {
  const panel = document.getElementById('diff-' + id);
  if (panel) panel.classList.toggle('open');
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('logBody');

  if (!page.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--muted);font-family:'DM Mono',monospace;">로그가 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = page.map((log, i) => {
    const idx    = start + i;
    const data   = log.after || log.before || {};
    const hasDiff = log.action === 'edit' && log.before;
    const diffContent = hasDiff ? buildDiff(log.before, log.after) : '';

    return `<tr>
      <td>${fmtTime(log.timestamp)}</td>
      <td><span class="badge ${ACTION_BADGE[log.action]||'badge-edit'}">${ACTION_ICON[log.action]||''} ${ACTION_LABEL[log.action]||log.action}</span></td>
      <td class="mono" style="font-size:11px;color:var(--a1);font-weight:700">${log.actor ? log.actor.split('@')[0] : '-'}</td>
      <td class="mono" style="font-size:12px">${log.member||'-'}<br><span style="color:var(--muted);font-size:10px">${log.team||''}</span></td>
      <td class="mono">${log.quarter||'-'}</td>
      <td style="font-weight:600;max-width:160px;word-break:break-all">${log.account||data.account||'-'}</td>
      <td class="mono">${data.product||'-'}</td>
      <td>
        <span style="font-size:11px;padding:2px 7px;border-radius:4px;background:${
          data.status==='Ship Confirm'?'#1e3a8a':
          data.status==='ACT'?'#dcfce7':
          data.status==='Pending'?'#dbeafe':'#fff7ed'
        };color:${
          data.status==='Ship Confirm'?'#fff':
          data.status==='ACT'?'#166534':
          data.status==='Pending'?'#1d4ed8':'#9a3412'
        };font-weight:700">${data.status||'-'}</span>
      </td>
      <td style="text-align:right" class="mono">${fmtKRW(data.priceKRW)}</td>
      <td>
        ${hasDiff
          ? `<button class="diff-btn" onclick="toggleDiff('${log._id}')">diff</button>
             <div class="diff-panel" id="diff-${log._id}">${diffContent}</div>`
          : log.action === 'delete'
            ? `<span style="font-size:10px;color:var(--red);font-family:'DM Mono',monospace">삭제됨</span>`
            : `<span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">-</span>`
        }
      </td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ 이전</button>`;

  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(total, currentPage + 2);
  if (start > 1) html += `<button class="pg-btn" onclick="goPage(1)">1</button>${start>2?'<span style="padding:0 4px;color:var(--muted)">…</span>':''}`;
  for (let i = start; i <= end; i++) {
    html += `<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < total) html += `${end<total-1?'<span style="padding:0 4px;color:var(--muted)">…</span>':''}<button class="pg-btn" onclick="goPage(${total})">${total}</button>`;
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>다음 ›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 로그인 상태 감지는 auth.onAuthStateChanged에서 처리
</script>
