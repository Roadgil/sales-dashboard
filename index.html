<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영업 납품처 FCST Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    /* 스크롤바 세팅 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ✨ 대표님 보고용 엑셀 리포트 전용 CSS */
    .excel-container { 
        width: 100%; 
        overflow-x: auto; 
        background: white; 
        border-radius: 8px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        margin-bottom: 30px;
    }
    .excel-table { 
        border-collapse: collapse; 
        width: max-content; 
        min-width: 100%;
        white-space: nowrap; 
    }
    .excel-table th, .excel-table td { 
        border: 1px solid #cbd5e1; 
        padding: 5px 6px; 
        font-size: 11px; 
        text-align: right; 
        vertical-align: middle;
    }
    .excel-table th { background-color: #f8fafc; color: #334155; font-weight: bold; text-align: center; }
    .excel-table .header-dark { background-color: #1e293b !important; color: white !important; border-color: #334155 !important; }
    
    .bg-yellow { background-color: #fef9c3 !important; }
    .bg-blue { background-color: #e0f2fe !important; }
    .bg-red-light { background-color: #fee2e2 !important; }
    .text-red { color: #dc2626 !important; font-weight: bold; }
    .text-blue { color: #2563eb !important; font-weight: bold; }
    
    /* 주차별 날짜 입력칸 (미니멀 다이어트) */
    input.week-input {
        width: 38px;
        text-align: center;
        font-size: 10px;
        padding: 2px 1px;
        margin: 0 auto 3px auto;
        border: 1px solid #94a3b8;
        border-radius: 2px;
        display: block;
        background-color: #ffffff;
    }
    input.week-input:focus { border-color: #2563eb; outline: none; background-color: #eff6ff; }
    
    .w-week { min-width: 44px; max-width: 44px; }
    .w-total { min-width: 48px; max-width: 48px; background-color: #fffbeb !important; font-weight: bold;}
    .w-prog { min-width: 45px; max-width: 45px; background-color: #f0fdf4 !important; font-weight: bold; color: #047857;}

    ::-webkit-scrollbar { height: 12px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
  </style>
</head>
<body className="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDpdX6I7fkE1m9jQDARg5l4Skv3vhD7iyI",
      authDomain: "sales-dashboard-d0d13.firebaseapp.com",
      projectId: "sales-dashboard-d0d13",
      storageBucket: "sales-dashboard-d0d13.firebasestorage.app",
      messagingSenderId: "870275096697",
      appId: "1:870275096697:web:cd7373b77358681e21b4a8",
      measurementId: "G-K5G6BMNBX9"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const { useState, useEffect } = React;

    const App = () => {
      const SECRET_PASSWORD = "candelakoreasales"; 

      const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('adminAuth') === 'true');
      const [pwdInput, setPwdInput] = useState('');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      
      // ✨ 화면 전환 상태 (dashboard vs report)
      const [viewMode, setViewMode] = useState('dashboard');

      const handleLogin = (e) => {
        e.preventDefault();
        if (pwdInput === SECRET_PASSWORD) {
          localStorage.setItem('adminAuth', 'true'); 
          setIsLoggedIn(true);
        } else {
          alert('비밀번호가 틀렸습니다. 다시 확인해주세요!');
          setPwdInput('');
        }
      };

      const [quarters, setQuarters] = useState(['2026 Q1', '2026 Q2']);
      const [selectedQuarter, setSelectedQuarter] = useState('2026 Q2');
      
      const [teams, setTeams] = useState({
        'Team 1': ['Kim SH', 'Oh SG'],
        'Team 2': ['Baek SC', 'Lee GR'],
        'Team 3': ['YC lim']
      });
      const [selectedTeam, setSelectedTeam] = useState('Team 1');
      const [selectedMember, setSelectedMember] = useState(null);

      const [activeStatTab, setActiveStatTab] = useState('product'); 

      const [memberTargets, setMemberTargets] = useState({
        'Kim SH': 1500000000, 'Oh SG': 1200000000, 'Baek SC': 1300000000, 'Lee GR': 1000000000, 'YC lim': 1000000000
      });

      const [quarterTargets, setQuarterTargets] = useState({
        '2026 Q1': { target: 0, gmppTarget: 0, er: 1389 },
        '2026 Q2': { target: 7255198319, gmppTarget: 4550036400, er: 1389 }
      });
      const [salesData, setSalesData] = useState([]);

      const initialForm = { status: 'FCST', contractType: '일반', deliveryDate: '', so: '', account: '', product: 'GMPP', accType: '', priceKRW: '', priceUSD: '', salesType: 'Direct', dealerName: '' };
      const [form, setForm] = useState(initialForm);
      const [editingId, setEditingId] = useState(null);

      // ✨ 리포트용 날짜 헤더 State
      const [weekHeaders, setWeekHeaders] = useState({});

      useEffect(() => {
        if (!isLoggedIn) return; 

        const unsubscribeSales = db.collection("sales").onSnapshot((snapshot) => {
          if (!snapshot.empty) setSalesData(snapshot.docs.map(doc => doc.data()));
        });
        const unsubscribeTargets = db.collection("targets").doc("quarterTargets").onSnapshot((doc) => {
          if (doc.exists) setQuarterTargets(doc.data());
        });
        const unsubscribeMemberTargets = db.collection("targets").doc("memberTargets").onSnapshot((doc) => {
          if (doc.exists) setMemberTargets(doc.data());
        });
        const unsubscribeLayout = db.collection("settings").doc("layout").onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            if (data.teams) setTeams(data.teams);
            if (data.quarters) setQuarters(data.quarters);
          } else {
            db.collection("settings").doc("layout").set({ teams, quarters });
          }
        });
        const unsubscribeReport = db.collection("settings").doc("report").onSnapshot((doc) => {
          if (doc.exists) setWeekHeaders(doc.data().weekHeaders || {});
        });

        return () => {
          unsubscribeSales(); unsubscribeTargets(); unsubscribeMemberTargets(); unsubscribeLayout(); unsubscribeReport();
        };
      }, [isLoggedIn]);

      const handleSave = () => {
        if(!form.account) return alert('Account명(납품처)을 입력해주세요.');
        if(!form.dealerName) return alert('Dealer Name 항목을 선택해주세요.');
        
        const payload = {
          ...form,
          priceKRW: Number(form.priceKRW) || 0,
          priceUSD: Number(form.priceUSD) || 0,
          id: editingId ? editingId : Date.now(),
          quarter: selectedQuarter,
          team: selectedTeam,
          member: selectedMember,
          dealerName: form.dealerName 
        };

        db.collection("sales").doc(payload.id.toString()).set(payload);
        setEditingId(null);
        setForm(initialForm);
      };

      const deleteSalesData = (id) => {
        if (window.confirm("이 납품 데이터를 정말 삭제하시겠습니까?")) {
          db.collection("sales").doc(id.toString()).delete();
        }
      };

      const handleTargetChange = (field, value) => {
        const val = value === '' ? '' : Number(value);
        const newTargets = {
          ...quarterTargets,
          [selectedQuarter]: { ...quarterTargets[selectedQuarter], [field]: val }
        };
        setQuarterTargets(newTargets);
        db.collection("targets").doc("quarterTargets").set(newTargets); 
      };

      const handleMemberTargetChange = (member, value) => {
        const val = value === '' ? '' : Number(value);
        const newMemberTargets = { ...memberTargets, [member]: val };
        setMemberTargets(newMemberTargets);
        db.collection("targets").doc("memberTargets").set(newMemberTargets); 
      };

      const handleEdit = (data) => {
        setForm(data); setEditingId(data.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleWeekHeaderChange = (key, value) => {
        const newHeaders = { ...weekHeaders, [key]: value };
        setWeekHeaders(newHeaders);
        db.collection("settings").doc("report").set({ weekHeaders: newHeaders }, { merge: true });
      };

      const addTeam = () => {
        const newTeam = prompt('추가할 탭 이름을 입력하세요 (예: Team 4)');
        if (newTeam && !teams[newTeam]) {
          const newTeams = { ...teams, [newTeam]: [] };
          setTeams(newTeams); setSelectedTeam(newTeam); setSelectedMember(null);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });
        }
      };

      const addMember = () => {
        const newMember = prompt(`${selectedTeam}에 추가할 멤버 이름을 입력하세요`);
        if (newMember && !teams[selectedTeam].includes(newMember)) {
          const newTeams = { ...teams, [selectedTeam]: [...teams[selectedTeam], newMember] };
          setTeams(newTeams); handleMemberTargetChange(newMember, 0);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });
        }
      };

      const editMemberName = (oldName, e) => {
        e.stopPropagation(); 
        const newName = prompt('새로운 이름을 입력하세요', oldName);
        if (newName && newName !== oldName && !teams[selectedTeam].includes(newName)) {
          const newTeams = { ...teams };
          newTeams[selectedTeam] = newTeams[selectedTeam].map(m => m === oldName ? newName : m);
          setTeams(newTeams);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });

          const newTargets = { ...memberTargets };
          if (newTargets[oldName] !== undefined) {
            newTargets[newName] = newTargets[oldName];
            delete newTargets[oldName];
            db.collection("targets").doc("memberTargets").set(newTargets);
          }
          salesData.filter(d => d.member === oldName).forEach(d => {
            db.collection("sales").doc(d.id.toString()).update({ member: newName });
          });
        }
      };

      const addQuarter = () => {
        const newQuarter = prompt('추가할 년도와 분기를 입력하세요 (예: 2026 Q3)');
        if (newQuarter && !quarters.includes(newQuarter)) {
          const newQuarters = [...quarters, newQuarter].sort();
          setQuarters(newQuarters); handleTargetChange('target', 0); 
          db.collection("settings").doc("layout").set({ quarters: newQuarters }, { merge: true });
        }
      };

      const currentER = quarterTargets[selectedQuarter]?.er || 1389;

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (name === 'priceKRW') {
          const krwValue = value ? parseFloat(value) : 0;
          const usdValue = krwValue ? (krwValue / currentER).toFixed(2) : '';
          setForm({ ...form, priceKRW: value, priceUSD: usdValue });
        } else if (name === 'salesType') {
          setForm({ ...form, [name]: value, dealerName: '' });
        } else {
          setForm({ ...form, [name]: value });
        }
      };

      const exportToCSV = () => {
        if (salesData.length === 0) return alert("추출할 데이터가 없습니다.");
        const headers = ['Quarter', 'Team', 'Member', 'Status', 'Contract Type', 'Delivery Date', 'Sales Type', 'Dealer Name', 'SO', 'Account', 'Product', 'Acc Type', 'Price(KRW)', 'Price(USD)'];
        const rows = salesData.map(d => [d.quarter, d.team, d.member, d.status, d.contractType, d.deliveryDate, d.salesType, d.dealerName, d.so, d.account, d.product, d.accType, d.priceKRW, d.priceUSD]);
        const csvContent = [headers.join(','), ...rows.map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url;
        const today = new Date().toISOString().slice(0,10);
        link.setAttribute('download', `FCST_Sales_Data_${today}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const groupedQuarters = quarters.reduce((acc, q) => {
        const [year, quarter] = q.split(' '); 
        if (!acc[year]) acc[year] = [];
        acc[year].push(quarter);
        return acc;
      }, {});

      if (!isLoggedIn) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-800 font-sans px-4">
            <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
              <div className="text-4xl mb-4">📊</div>
              <h2 className="text-2xl font-extrabold text-slate-800 mb-2">영업 납품처 Dashboard</h2>
              <p className="text-slate-500 text-sm mb-8">접근 권한이 필요합니다. 비밀번호를 입력해주세요.</p>
              
              <form onSubmit={handleLogin} className="flex flex-col space-y-4">
                <input type="password" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-mono text-center text-lg tracking-widest" placeholder="Password" autoFocus />
                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">접속하기</button>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // 공통 데이터 연산 (Dashboard & Report)
      // ==========================================
      const currentQData = salesData.filter(d => d.quarter === selectedQuarter);
      const currentTargets = quarterTargets[selectedQuarter] || { target: 0, gmppTarget: 0, er: 1389 };
      const targetKRW = currentTargets.target || 0;
      const gmppTargetKRW = currentTargets.gmppTarget || 0;
      const activeER = currentTargets.er || 1389;

      const expectedData = currentQData.filter(d => d.status === 'FCST' || d.status === 'ACT');
      const expectedKRW = expectedData.reduce((acc, cur) => acc + cur.priceKRW, 0);
      const expectedUSD = expectedKRW / activeER;

      // ==========================================
      // Dashboard 전용 렌더링 함수들
      // ==========================================
      const renderProgressBar = (actKRW, targetKRW) => {
        if (!targetKRW) return null;
        const target120 = targetKRW * 1.2;
        const target140 = targetKRW * 1.4;
        const per = (actKRW / targetKRW) * 100;
        const maxScale = Math.max(target140, actKRW * 1.05); 
        return (
          <div className="w-full mt-6 md:mt-8">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 md:mb-8 relative">
              <span className="text-sm font-bold text-gray-600 mb-2 md:mb-0">현재 누적 예상치: ₩ {actKRW.toLocaleString()}</span>
              <span className={`text-lg font-extrabold ${per >= 100 ? 'text-green-600' : 'text-blue-600'}`}>달성률: {per.toFixed(1)}%</span>
              <div className="hidden md:block absolute w-full -bottom-6 left-0 h-5">
                <div className="absolute -translate-x-1/2 text-xs font-bold text-gray-500" style={{ left: `${(targetKRW / maxScale) * 100}%` }}>100%</div>
                <div className="absolute -translate-x-1/2 text-xs font-bold text-green-600" style={{ left: `${(target120 / maxScale) * 100}%` }}>120%</div>
                <div className="absolute -translate-x-1/2 text-xs font-bold text-purple-600" style={{ left: `${(target140 / maxScale) * 100}%` }}>140%</div>
              </div>
            </div>
            <div className="relative w-full h-6 md:h-8 bg-gray-200 rounded-full overflow-hidden shadow-inner border border-gray-300">
              <div className={`h-full transition-all duration-1000 ease-out flex items-center justify-end pr-3 text-white font-bold text-xs md:text-sm ${per >= 100 ? 'bg-green-500' : 'bg-blue-500'}`} style={{ width: `${(actKRW / maxScale) * 100}%` }}>{per > 5 && `${per.toFixed(1)}%`}</div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-gray-500" style={{ left: `${(targetKRW / maxScale) * 100}%` }}></div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-green-300" style={{ left: `${(target120 / maxScale) * 100}%` }}></div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-purple-300" style={{ left: `${(target140 / maxScale) * 100}%` }}></div>
            </div>
          </div>
        );
      };

      const renderBarChart = (dataObj, colorClass) => {
        const dataArr = Object.entries(dataObj).sort((a, b) => b.sumKRW - a.sumKRW);
        const maxVal = Math.max(...dataArr.map(d => d.sumKRW), 1);
        return (
          <div className="space-y-4">
            {dataArr.map(([key, stat]) => {
              const per = maxVal === 0 ? 0 : (stat.sumKRW / maxVal) * 100;
              return (
                <div key={key} className="flex flex-col">
                  <div className="flex justify-between items-end mb-1 text-xs md:text-sm">
                    <span className="font-bold text-gray-800">{key} <span className="text-gray-400 font-normal ml-1">({stat.count}건)</span></span>
                    <span className="font-mono font-bold text-gray-700 text-[13px] md:text-[15px]">₩ {stat.sumKRW.toLocaleString()}</span>
                  </div>
                  <div className="w-full bg-gray-100 h-2 md:h-3 rounded-full overflow-hidden shadow-inner flex"><div className={`${colorClass} h-full rounded-full transition-all duration-1000`} style={{ width: `${per}%` }}></div></div>
                </div>
              );
            })}
          </div>
        );
      };

      const renderMemberChart = (dataObj, targetsObj, colorClass) => {
        const dataArr = Object.entries(dataObj).sort((a, b) => b.sumKRW - a.sumKRW);
        return (
          <div className="space-y-5">
            {dataArr.map(([key, stat]) => {
              const target = targetsObj[key] || 0;
              const per = target === 0 ? 0 : (stat.sumKRW / target) * 100;
              return (
                <div key={key} className="flex flex-col">
                  <div className="flex justify-between items-end mb-1 text-xs md:text-sm">
                    <span className="font-bold text-gray-800">{key} <span className="text-gray-400 font-normal ml-1">({stat.count}건)</span></span>
                    <div className="text-right flex flex-col">
                      <span className="font-mono font-bold text-gray-800 text-[13px] md:text-[15px]">₩ {stat.sumKRW.toLocaleString()} {target > 0 && <span className={`${per >= 100 ? 'text-green-600' : 'text-emerald-600'} text-[10px] md:text-[12px] ml-1`}>({per.toFixed(1)}%)</span>}</span>
                      {target > 0 && <span className="font-mono text-gray-400 text-[9px] md:text-[10px]">Target: ₩ {target.toLocaleString()}</span>}
                    </div>
                  </div>
                  <div className="w-full bg-gray-100 h-2 md:h-3 rounded-full overflow-hidden shadow-inner flex"><div className={`${colorClass} h-full rounded-full transition-all duration-1000`} style={{ width: `${per > 100 ? 100 : per}%` }}></div></div>
                </div>
              );
            })}
          </div>
        );
      };

      // ==========================================
      // Report 전용 데이터 및 연산
      // ==========================================
      const qStr = selectedQuarter.split(' ') || 'Q1';
      let m1=1, m2=2, m3=3;
      let m1Name='Jan', m2Name='Feb', m3Name='Mar';
      if(qStr === 'Q2') { m1=4; m2=5; m3=6; m1Name='Apr'; m2Name='May'; m3Name='Jun'; }
      if(qStr === 'Q3') { m1=7; m2=8; m3=9; m1Name='Jul'; m2Name='Aug'; m3Name='Sep'; }
      if(qStr === 'Q4') { m1=10; m2=11; m3=12; m1Name='Oct'; m2Name='Nov'; m3Name='Dec'; }

      const getMonthIdx = (dStr) => {
        if(!dStr) return -1;
        const m = parseInt(dStr.split('-'), 10);
        return isNaN(m) ? -1 : m;
      };
      
      const getWeekIdx = (dStr) => {
        if(!dStr) return 0;
        const d = parseInt(dStr.split('-'), 10);
        if(isNaN(d)) return 0;
        if(d <= 7) return 1;
        if(d <= 14) return 2;
        if(d <= 21) return 3;
        if(d <= 28) return 4;
        return 5;
      };

      const toM = (val) => val / 1000000;
      const formatM = (val) => {
        if (!val || isNaN(val) || val === 0 || val === Infinity || val === -Infinity) return '-';
        return Number(val).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
      };
      const formatP = (val) => {
        if (!val || isNaN(val) || val === 0 || val === Infinity || val === -Infinity) return '-';
        return (Number(val) * 100).toFixed(1) + '%';
      };

      let reportRows = [];
      Object.entries(teams).sort(([a], [b]) => a.localeCompare(b)).forEach(([team, members]) => {
        members.forEach(member => {
          const mData = expectedData.filter(d => d.member === member);
          const calcMonth = (m) => mData.filter(d => getMonthIdx(d.deliveryDate) === m).reduce((a,b)=>a+toM(b.priceKRW),0);
          const calcWeek = (m, w) => mData.filter(d => getMonthIdx(d.deliveryDate) === m && getWeekIdx(d.deliveryDate) === w).reduce((a,b)=>a+toM(b.priceKRW),0);

          const valM1 = calcMonth(m1);
          const valM2 = calcMonth(m2);
          const valM3 = calcMonth(m3);
          
          const total = valM1 + valM2 + valM3;
          const budget = toM(memberTargets[member] || 0);
          const gap = budget - total; 
          const progress = budget ? total / budget : 0;

          const weeksM1 = [calcWeek(m1,1), calcWeek(m1,2), calcWeek(m1,3), calcWeek(m1,4), calcWeek(m1,5)];
          const weeksM2 = [calcWeek(m2,1), calcWeek(m2,2), calcWeek(m2,3), calcWeek(m2,4), calcWeek(m2,5)];
          const weeksM3 = [calcWeek(m3,1), calcWeek(m3,2), calcWeek(m3,3), calcWeek(m3,4), calcWeek(m3,5)];

          reportRows.push({ team, member, valM1, valM2, valM3, total, budget, gap, progress, weeksM1, weeksM2, weeksM3 });
        });
      });

      const sumM1 = reportRows.reduce((a,b)=>a+b.valM1,0);
      const sumM2 = reportRows.reduce((a,b)=>a+b.valM2,0);
      const sumM3 = reportRows.reduce((a,b)=>a+b.valM3,0);
      const sumTotal = reportRows.reduce((a,b)=>a+b.total,0);
      
      const repSumBudget = toM(targetKRW);
      const repSumGap = repSumBudget - sumTotal;
      const repSumProgress = repSumBudget ? sumTotal / repSumBudget : 0;

      const sumWeeksM1 =.map(i => reportRows.reduce((a,b)=>a+b.weeksM1[i-1], 0));
      const sumWeeksM2 =.map(i => reportRows.reduce((a,b)=>a+b.weeksM2[i-1], 0));
      const sumWeeksM3 =.map(i => reportRows.reduce((a,b)=>a+b.weeksM3[i-1], 0));

      const allProducts = ['GMPP', 'Picoway', 'Cryo7', 'VBP', 'Hand Piece', 'Nordlys', 'Nordlys Mini', 'GMP'];
      const productCounts = {};
      allProducts.forEach(p => productCounts[p] = { count: 0 });
      expectedData.forEach(d => { if(productCounts[d.product]) productCounts[d.product].count += 1; });

      return (
        <div className="flex flex-col md:flex-row h-screen font-sans">
          {/* 모바일 햄버거 */}
          <div className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-20">
            <h2 className="text-lg font-bold text-blue-400">📊 FCST Dashboard</h2>
            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-2xl focus:outline-none">{isSidebarOpen ? '✕' : '☰'}</button>
          </div>

          {/* 사이드바 */}
          <div className={`${isSidebarOpen ? 'block' : 'hidden'} md:flex flex-col w-full md:w-64 bg-slate-800 text-white p-5 overflow-y-auto z-10 md:static absolute h-full md:h-auto shadow-2xl md:shadow-none`}>
            <h2 className="hidden md:block text-xl font-bold mb-6 text-blue-400">영업 납품처 FCST</h2>
            <div className="flex-1">
              {Object.entries(groupedQuarters).sort().reverse().map(([year, qList]) => (
                <div key={year} className="mb-6">
                  <h4 className="text-slate-400 font-extrabold mb-2 text-sm border-b border-slate-600 pb-1">{year}년</h4>
                  <div className="space-y-1">
                    {qList.sort().map(q => {
                      const fullQ = `${year} ${q}`;
                      return (
                        <button key={fullQ} onClick={() => { setSelectedQuarter(fullQ); setSelectedMember(null); setIsSidebarOpen(false); }} className={`w-full text-left px-4 py-2 rounded font-semibold transition ${selectedQuarter === fullQ ? 'bg-blue-600 shadow-md text-white' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}`}>{q}</button>
                      );
                    })}
                  </div>
                </div>
              ))}
              <button onClick={addQuarter} className="w-full mt-2 border border-dashed border-slate-500 text-slate-300 py-2 rounded hover:bg-slate-700 hover:text-white transition text-sm">+ 분기 추가</button>
            </div>
            
            <div className="mt-8 border-t border-slate-600 pt-4">
              {/* ✨ 통합 뷰 스위치 버튼 */}
              <button onClick={() => { setViewMode('dashboard'); setIsSidebarOpen(false); }} className={`w-full py-3 mb-2 rounded-lg font-extrabold transition flex items-center justify-center shadow-md ${viewMode === 'dashboard' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                📝 데이터 입력 (Dash)
              </button>
              <button onClick={() => { setViewMode('report'); setIsSidebarOpen(false); }} className={`w-full py-3 mb-4 rounded-lg font-extrabold transition flex items-center justify-center shadow-md ${viewMode === 'report' ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                📊 대표님 보고용
              </button>

              <button onClick={exportToCSV} className="w-full bg-slate-200 text-slate-800 font-bold py-3 rounded-lg hover:bg-slate-300 transition flex items-center justify-center shadow-sm">
                엑셀 (CSV) 다운로드
              </button>
              <button onClick={() => { localStorage.removeItem('adminAuth'); setIsLoggedIn(false); }} className="w-full mt-4 border border-slate-600 text-slate-400 py-2 rounded text-sm hover:bg-slate-700 transition">로그아웃</button>
            </div>
          </div>

          <div className="flex-1 p-4 md:p-8 overflow-y-auto bg-gray-100">
            
            {/* =========================================
                화면 1. 대표님 보고용 (Report View)
            ========================================= */}
            {viewMode === 'report' ? (
              <div className="animate-fade-in">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6">
                  <div className="mb-4 md:mb-0">
                    <h1 className="text-2xl font-extrabold text-slate-800">Monthly Sales Progress Check</h1>
                    <p className="text-slate-500 text-sm font-bold mt-1">Candela Korea - Capital Sales Only <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded ml-2">(Unit: M₩)</span></p>
                  </div>
                </div>

                <div className="excel-container">
                  <table className="excel-table">
                    <thead>
                      <tr>
                        <th rowSpan="2" className="text-left align-middle" style={{minWidth: '60px'}}>Team</th>
                        <th rowSpan="2" className="text-left align-middle" style={{minWidth: '80px'}}>Sales Reps</th>
                        <th rowSpan="2" className="text-center align-middle" style={{minWidth: '45px'}}>{m1Name}</th>
                        <th rowSpan="2" className="text-center align-middle" style={{minWidth: '45px'}}>{m2Name}</th>
                        <th rowSpan="2" className="text-center align-middle" style={{minWidth: '45px'}}>{m3Name}</th>
                        
                        <th rowSpan="2" className="bg-yellow text-center align-middle" style={{minWidth: '55px'}}>Q Total</th>
                        <th rowSpan="2" className="bg-blue text-center align-middle" style={{minWidth: '55px'}}>Q Budget</th>
                        <th rowSpan="2" className="text-center align-middle" style={{minWidth: '45px'}}>%</th>
                        <th rowSpan="2" className="bg-red-light text-red text-center align-middle" style={{minWidth: '55px'}}>Gap</th>
                        
                        {/* M1, M2, M3 Progress 헤더 */}
                        <th colSpan="7" className="header-dark">{m1Name} Progress</th>
                        <th colSpan="7" className="header-dark bg-slate-700">{m2Name} Progress</th>
                        <th colSpan="7" className="header-dark bg-slate-600">{m3Name} Progress</th>
                      </tr>
                      <tr>
                        {/* M1: 1~5주차 + Total + Prog */}
                        {.map(w => (
                          <th key={'h1'+w} className="font-normal text-center align-middle bg-slate-50 w-week">
                            <input type="text" value={weekHeaders[`m1w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m1w${w}`, e.target.value)} className="week-input" placeholder="M/D" />
                            <div className="font-bold text-[10px] leading-none text-slate-700">{w}주차</div>
                          </th>
                        ))}
                        <th className="w-total align-bottom text-center">Total</th>
                        <th className="w-prog align-bottom text-center">Prog.</th>

                        {/* M2: 1~5주차 + Total + Prog */}
                        {.map(w => (
                          <th key={'h2'+w} className="font-normal text-center align-middle bg-slate-50 w-week">
                            <input type="text" value={weekHeaders[`m2w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m2w${w}`, e.target.value)} className="week-input" placeholder="M/D" />
                            <div className="font-bold text-[10px] leading-none text-slate-700">{w}주차</div>
                          </th>
                        ))}
                        <th className="w-total align-bottom text-center">Total</th>
                        <th className="w-prog align-bottom text-center">Prog.</th>

                        {/* M3: 1~5주차 + Total + Prog */}
                        {.map(w => (
                          <th key={'h3'+w} className="font-normal text-center align-middle bg-slate-50 w-week">
                            <input type="text" value={weekHeaders[`m3w${w}`] || ''} onChange={(e) => handleWeekHeaderChange(`m3w${w}`, e.target.value)} className="week-input" placeholder="M/D" />
                            <div className="font-bold text-[10px] leading-none text-slate-700">{w}주차</div>
                          </th>
                        ))}
                        <th className="w-total align-bottom text-center">Total</th>
                        <th className="w-prog align-bottom text-center">Prog.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reportRows.map((r, i) => (
                        <tr key={i} className="hover:bg-slate-50 transition">
                          <td className="text-left text-slate-500 font-bold">{r.team}</td>
                          <td className="text-left font-bold text-[12px]">{r.member}</td>
                          <td className={r.valM1 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM1)}</td>
                          <td className={r.valM2 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM2)}</td>
                          <td className={r.valM3 ? 'text-slate-800 font-bold' : ''}>{formatM(r.valM3)}</td>
                          
                          <td className="bg-yellow font-bold text-blue-700">{formatM(r.total)}</td>
                          <td className="bg-blue font-bold text-slate-600">{formatM(r.budget)}</td>
                          <td className="text-blue font-bold">{formatP(r.progress)}</td>
                          <td className="bg-red-light text-red">{r.gap === 0 ? '' : formatM(r.gap)}</td>
                          
                          {/* M1 */}
                          {r.weeksM1.map((w, idx) => <td key={'m1'+idx} className={w ? 'text-slate-800 font-bold w-week' : 'w-week text-slate-300'}>{formatM(w)}</td>)}
                          <td className="w-total text-slate-800">{formatM(r.valM1)}</td>
                          <td className="w-prog">{formatP(r.budget ? r.valM1 / r.budget : 0)}</td>
                          
                          {/* M2 */}
                          {r.weeksM2.map((w, idx) => <td key={'m2'+idx} className={w ? 'text-slate-800 font-bold w-week' : 'w-week text-slate-300'}>{formatM(w)}</td>)}
                          <td className="w-total text-slate-800">{formatM(r.valM2)}</td>
                          <td className="w-prog">{formatP(r.budget ? r.valM2 / r.budget : 0)}</td>

                          {/* M3 */}
                          {r.weeksM3.map((w, idx) => <td key={'m3'+idx} className={w ? 'text-slate-800 font-bold w-week' : 'w-week text-slate-300'}>{formatM(w)}</td>)}
                          <td className="w-total text-slate-800">{formatM(r.valM3)}</td>
                          <td className="w-prog">{formatP(r.budget ? r.valM3 / r.budget : 0)}</td>
                        </tr>
                      ))}
                      
                      {/* TOTAL ROW */}
                      <tr className="header-dark font-bold text-[12px]">
                        <td colSpan="2" className="text-center tracking-widest">TOTAL</td>
                        <td>{formatM(sumM1)}</td>
                        <td>{formatM(sumM2)}</td>
                        <td>{formatM(sumM3)}</td>
                        
                        <td className="text-yellow-300 bg-yellow">{formatM(sumTotal)}</td>
                        <td className="text-blue-300 bg-blue">{formatM(repSumBudget)}</td>
                        <td className="text-green-300">{formatP(repSumProgress)}</td>
                        <td className="text-red-300 bg-red-light">{formatM(repSumGap)}</td>

                        {/* M1 Total & Prog */}
                        {sumWeeksM1.map((w, idx) => <td key={'sm1'+idx} className="w-week">{formatM(w)}</td>)}
                        <td className="text-blue-800 w-total">{formatM(sumM1)}</td>
                        <td className="w-prog">{formatP(repSumBudget ? sumM1 / repSumBudget : 0)}</td>
                        
                        {/* M2 Total & Prog */}
                        {sumWeeksM2.map((w, idx) => <td key={'sm2'+idx} className="w-week">{formatM(w)}</td>)}
                        <td className="text-blue-800 w-total">{formatM(sumM2)}</td>
                        <td className="w-prog">{formatP(repSumBudget ? sumM2 / repSumBudget : 0)}</td>

                        {/* M3 Total & Prog */}
                        {sumWeeksM3.map((w, idx) => <td key={'sm3'+idx} className="w-week">{formatM(w)}</td>)}
                        <td className="text-blue-800 w-total">{formatM(sumM3)}</td>
                        <td className="w-prog">{formatP(repSumBudget ? sumM3 / repSumBudget : 0)}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <div className="excel-container w-full md:w-1/3">
                  <table className="excel-table w-full">
                    <thead>
                      <tr>
                        <th colSpan="2" className="header-dark bg-slate-600">System Required (# of unit)</th>
                      </tr>
                      <tr>
                        <th className="text-left w-1/2">Product</th>
                        <th className="w-1/2">Sales Count</th>
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(productCounts).sort((a,b)=>b.count - a.count).map(([p, data]) => (
                        <tr key={p}>
                          <td className="text-left font-bold">{p}</td>
                          <td className="font-bold text-blue-600">{data.count > 0 ? `${data.count} 대` : '-'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : 

            /* =========================================
                화면 2. 데이터 입력 (Dashboard View)
            ========================================= */
            !selectedMember ? (
              <div className="animate-fade-in">
                <h1 className="text-2xl md:text-3xl font-extrabold mb-4 text-gray-800">{selectedQuarter} Dashboard</h1>
                
                <div className="bg-white p-4 md:p-6 rounded-lg shadow-md mb-6 md:mb-8 border border-gray-200">
                  <h3 className="text-lg md:text-xl font-bold mb-4 border-b pb-2 text-gray-800">🚀 전체 영업 목표 달성 현황</h3>
                  <div className="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-4 mb-2">
                    <div className="bg-gray-50 px-4 py-3 rounded shadow-sm border-l-4 border-gray-500 flex-1"><span className="text-xs text-gray-500 font-bold block">100% Target</span><span className="font-bold text-gray-800 text-base md:text-lg">₩ {targetKRW.toLocaleString()}</span></div>
                    <div className="bg-green-50 px-4 py-3 rounded shadow-sm border-l-4 border-green-500 flex-1"><span className="text-xs text-green-600 font-bold block">120% Target</span><span className="font-bold text-green-700 text-base md:text-lg">₩ {incentiveTargetKRW.toLocaleString()}</span></div>
                    <div className="bg-purple-50 px-4 py-3 rounded shadow-sm border-l-4 border-purple-500 flex-1"><span className="text-xs text-purple-600 font-bold block">140% Target</span><span className="font-bold text-purple-700 text-base md:text-lg">₩ {(targetKRW * 1.4).toLocaleString()}</span></div>
                  </div>
                  {renderProgressBar(expectedKRW, targetKRW)}
                </div>

                <div className="bg-white p-4 md:p-6 rounded-lg shadow-md mb-6 md:mb-8 border border-gray-200">
                  <h3 className="text-lg md:text-xl font-bold mb-4 border-b pb-2 text-gray-800">📋 분기 요약 지표 (Summary)</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 text-sm">
                    {/* ... (기존 Summary UI) ... */}
                    <div className="flex flex-col space-y-3">
                      <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-slate-700 font-extrabold text-[11px]">적용 환율 (ER) ✏️</span><input type="number" value={activeER === 0 ? '' : activeER} onChange={(e) => handleTargetChange('er', e.target.value)} className="w-full bg-transparent border-b border-slate-300 px-1 py-0.5 font-mono font-bold text-gray-800 text-[16px] text-right outline-none focus:border-slate-500 transition" placeholder="예: 1389" /></div>
                      <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-blue-700 font-extrabold text-[11px]">Target (KRW) ✏️</span><input type="number" value={targetKRW === 0 ? '' : targetKRW} onChange={(e) => handleTargetChange('target', e.target.value)} className="w-full bg-transparent border-b border-blue-300 px-1 py-0.5 font-mono font-bold text-gray-800 text-[16px] text-right outline-none focus:border-blue-500 transition" placeholder="목표 금액 기입" /></div>
                      <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-100 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-blue-600 font-bold text-[11px]">Target (USD)</span><span className="font-mono font-bold text-gray-800 text-[16px] text-right px-1">$ {targetUSD.toLocaleString(undefined, {maximumFractionDigits:2})}</span></div>
                      <div className="bg-green-50 p-3 rounded-xl border border-green-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-green-700 font-extrabold text-[11px]">Incentive Target (KRW)</span><span className="font-mono font-bold text-green-800 text-[16px] text-right px-1">₩ {incentiveTargetKRW.toLocaleString()}</span></div>
                    </div>
                    <div className="flex flex-col space-y-3">
                      <div className="bg-green-50 p-3 rounded-xl border border-green-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-green-700 font-extrabold text-[11px]">Incentive Target (USD)</span><span className="font-mono font-bold text-green-800 text-[16px] text-right px-1">$ {incentiveTargetUSD.toLocaleString(undefined, {maximumFractionDigits:2})}</span></div>
                      <div className="bg-yellow-50 p-3 rounded-xl border border-yellow-300 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-yellow-800 font-extrabold text-[11px]">예상치 (KRW)</span><span className="font-mono font-bold text-gray-800 text-[16px] text-right px-1">₩ {expectedKRW.toLocaleString()}</span></div>
                      <div className="bg-yellow-50/50 p-3 rounded-xl border border-yellow-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-yellow-700 font-extrabold text-[11px]">ER1 ($)</span><span className="font-mono font-bold text-gray-800 text-[16px] text-right px-1">$ {expectedUSD.toLocaleString(undefined, {maximumFractionDigits:2})}</span></div>
                      <div className="bg-gray-50 p-3 rounded-xl border border-gray-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-gray-600 font-bold text-[11px]">GAP (KRW)</span><span className="font-mono font-bold text-red-500 text-[16px] text-right px-1">₩ {gapKRW.toLocaleString()}</span></div>
                    </div>
                    <div className="flex flex-col space-y-3">
                      <div className="bg-gray-50 p-3 rounded-xl border border-gray-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-gray-600 font-bold text-[11px]">% (예상치 달성률)</span><span className="font-mono font-bold text-blue-600 text-[18px] text-right px-1">{(targetKRW ? (expectedKRW / targetKRW) * 100 : 0).toFixed(3)} %</span></div>
                      <div className="bg-purple-50 p-3 rounded-xl border border-purple-300 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-purple-800 font-extrabold text-[11px]">GMPP Target (KRW) ✏️</span><input type="number" value={gmppTargetKRW === 0 ? '' : gmppTargetKRW} onChange={(e) => handleTargetChange('gmppTarget', e.target.value)} className="w-full bg-transparent border-b border-purple-300 px-1 py-0.5 font-mono font-bold text-gray-800 text-[16px] text-right outline-none focus:border-purple-500 transition" placeholder="GMPP 목표 기입" /></div>
                      <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-slate-700 font-bold text-[11px]">GMPP 예상치 (KRW)</span><span className="font-mono font-bold text-gray-800 text-[16px] text-right px-1">₩ {(expectedData.filter(d => d.product === 'GMPP').reduce((acc, cur) => acc + cur.priceKRW, 0)).toLocaleString()}</span></div>
                      <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col justify-between shadow-sm min-h-[85px]"><span className="text-slate-700 font-bold text-[11px]">GMPP GAP (KRW)</span><span className="font-mono font-bold text-red-500 text-[16px] text-right px-1">₩ {(gmppTargetKRW - expectedData.filter(d => d.product === 'GMPP').reduce((acc, cur) => acc + cur.priceKRW, 0)).toLocaleString()}</span></div>
                    </div>
                  </div>

                  {/* Direct vs Indirect */}
                  <div className="mt-6 border-t border-slate-200 pt-5">
                    <h4 className="text-[13px] font-bold text-slate-600 mb-2">🔄 Sales Type 비중 (Direct vs Indirect)</h4>
                    <div className="flex flex-col md:flex-row justify-between text-xs md:text-sm font-bold mb-2 md:mb-1">
                      <span className="text-blue-600 mb-1 md:mb-0">Direct: ₩ {(expectedData.filter(d => d.salesType === 'Direct').reduce((a,b)=>a+b.priceKRW,0)).toLocaleString()}</span>
                      <span className="text-purple-600">Indirect: ₩ {(expectedData.filter(d => d.salesType === 'Indirect').reduce((a,b)=>a+b.priceKRW,0)).toLocaleString()}</span>
                    </div>
                  </div>
                </div>

                {/* 하단 차트 및 팀 멤버 리스트 */}
                <div className="flex overflow-x-auto mb-4 border-b pb-[1px] hide-scrollbar">
                  {Object.keys(teams).map(team => (
                    <button key={team} onClick={() => { setSelectedTeam(team); setSelectedMember(null); setEditingId(null); setForm(initialForm); }} className={`whitespace-nowrap px-6 md:px-8 py-3 font-bold rounded-t-lg transition ${selectedTeam === team ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-200 text-gray-500 hover:bg-gray-300 hover:text-gray-700'}`}>{team}</button>
                  ))}
                  <button onClick={addTeam} className="whitespace-nowrap px-4 md:px-6 py-3 font-bold rounded-t-lg text-blue-600 bg-blue-50 border border-blue-200 border-b-0 hover:bg-blue-100 transition">+ 탭 추가</button>
                </div>

                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg md:text-xl font-bold text-gray-700">{selectedTeam} 목록</h3>
                  <button onClick={addMember} className="text-xs md:text-sm bg-blue-100 text-blue-700 font-bold px-3 md:px-4 py-2 rounded shadow-sm hover:bg-blue-200 transition">+ 항목 추가</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-10">
                  {teams[selectedTeam].length === 0 ? (
                    <div className="col-span-1 md:col-span-2 p-8 text-center text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">등록된 항목이 없습니다. 우측 상단의 '+ 항목 추가' 버튼을 눌러주세요.</div>
                  ) : (
                    teams[selectedTeam].map(member => (
                      <div key={member} onClick={() => setSelectedMember(member)} className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-lg hover:border-blue-400 hover:-translate-y-1 transition-all group relative">
                        <div className="flex justify-between items-start">
                          <div className="text-xl md:text-2xl font-bold text-gray-800 group-hover:text-blue-600">{member}</div>
                          <button onClick={(e) => editMemberName(member, e)} className="text-xs text-gray-500 hover:text-blue-600 bg-gray-100 hover:bg-blue-50 px-2 py-1 rounded transition border">✏️ 이름 수정</button>
                        </div>
                        <div className="text-xs md:text-sm text-gray-500 mt-2 font-medium">담당 납품처 및 데이터 관리 &rarr;</div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            ) : (
              <div className="animate-fade-in">
                <button onClick={() => { setSelectedMember(null); setEditingId(null); setForm(initialForm); }} className="mb-4 flex items-center bg-slate-700 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-slate-800 transition">
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                  뒤로가기 (팀 목록)
                </button>

                <div className="bg-white p-4 md:p-8 rounded-xl shadow-md border border-gray-100 mb-8">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl md:text-3xl font-extrabold text-gray-800">{selectedMember} <span className="text-lg md:text-xl text-gray-500 font-medium block md:inline mt-1 md:mt-0">Account FCST</span></h3>
                  </div>

                  {memberTargets[selectedMember] !== undefined && (
                    <div className="bg-blue-50/50 p-4 md:p-6 rounded-lg border border-blue-100 mb-8">
                      <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-4">
                        <h4 className="font-bold text-base md:text-lg text-gray-700 mb-4 lg:mb-0">🎯 누적 달성 현황 (FCST + ACT)</h4>
                        <div className="flex flex-wrap gap-2 lg:gap-3 w-full lg:w-auto">
                          <div className="flex flex-col bg-white px-2 py-2 rounded shadow-sm border-l-4 border-gray-500 border-2 flex-1 lg:flex-none">
                            <span className="text-[10px] text-gray-500 block font-bold mb-1">100% Target (KRW) ✏️ 직접기입</span>
                            <div className="flex items-center">
                              <span className="font-bold text-sm mr-1 text-gray-700">₩</span>
                              <input type="number" value={memberTargets[selectedMember] === 0 ? '' : memberTargets[selectedMember]} onChange={(e) => handleMemberTargetChange(selectedMember, e.target.value)} className="w-full md:w-28 bg-transparent border-b border-gray-300 font-mono font-bold text-sm md:text-[15px] outline-none focus:border-blue-500 text-gray-800 transition text-right" placeholder="목표금액" />
                            </div>
                          </div>
                          <div className="flex flex-col justify-center bg-white px-2 md:px-3 py-2 h-auto md:h-[52px] rounded shadow-sm border-l-4 border-green-500 flex-1 lg:flex-none"><span className="text-[10px] text-green-600 block font-bold">120% Target</span><span className="font-bold text-xs md:text-sm text-green-700 text-right">₩ {(memberTargets[selectedMember]*1.2).toLocaleString()}</span></div>
                          <div className="flex flex-col justify-center bg-white px-2 md:px-3 py-2 h-auto md:h-[52px] rounded shadow-sm border-l-4 border-purple-500 flex-1 lg:flex-none"><span className="text-[10px] text-purple-600 block font-bold">140% Target</span><span className="font-bold text-xs md:text-sm text-purple-700 text-right">₩ {(memberTargets[selectedMember]*1.4).toLocaleString()}</span></div>
                        </div>
                      </div>
                      {renderProgressBar(salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember && (d.status === 'FCST' || d.status === 'ACT')).reduce((acc, cur) => acc + cur.priceKRW, 0), memberTargets[selectedMember])}
                    </div>
                  )}
                  
                  <form className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 bg-slate-50 p-4 md:p-6 rounded-lg border-2 transition ${editingId ? 'border-blue-400 bg-blue-50' : 'border-gray-200'}`}>
                    {editingId && <div className="col-span-1 md:col-span-2 lg:col-span-3 flex justify-between items-center text-blue-600 font-bold mb-[-10px]"><span className="text-sm md:text-base">✨ 데이터 수정 모드 진행 중...</span></div>}
                    
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">상태 (Status)</label><select name="status" value={form.status} onChange={handleInputChange} className={`w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-bold ${form.status === '미납' ? 'text-red-600 bg-red-50' : form.status === 'ACT' ? 'text-green-600 bg-green-50' : 'text-blue-600 bg-blue-50'}`}><option value="FCST">FCST (정상/예정)</option><option value="ACT">ACT (납품완료)</option><option value="미납">미납 (Pending)</option></select></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">계약 구분 (Contract Type)</label><select name="contractType" value={form.contractType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold"><option value="일반">일반 (Normal)</option><option value="Try & Buy">Try & Buy</option></select></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">납품예정일</label><input type="date" name="deliveryDate" value={form.deliveryDate} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" /></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Sales Type</label><select name="salesType" value={form.salesType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold"><option value="Direct">Direct</option><option value="Indirect">Indirect</option></select></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Dealer Name <span className="text-red-500">*</span></label><select name="dealerName" value={form.dealerName} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-purple-700"><option value="">선택 (필수)</option>{form.salesType === 'Direct' ? <option value="병원">병원</option> : <option value="기타">기타</option>}<option value="세븐유">세븐유</option><option value="이노메드">이노메드</option><option value="TMI">TMI</option></select></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">SO (Sales Order)</label><input type="text" name="so" value={form.so} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) SO-12345" /></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Account (병원/납품처명)</label><input type="text" name="account" value={form.account} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) 샤인빔의원 강서" /></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Product</label><select name="product" value={form.product} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"><option value="GMPP">GMPP</option><option value="Picoway">Picoway</option><option value="Cryo7">Cryo7</option><option value="VBP">VBP</option><option value="Hand Piece">Hand Piece</option><option value="Nordlys">Nordlys</option><option value="Nordlys Mini">Nordlys Mini</option><option value="GMP">GMP</option></select></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Acc type</label><input type="text" name="accType" value={form.accType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) 3, AIO(DCD)" /></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_KR (₩)</label><input type="number" name="priceKRW" value={form.priceKRW} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-yellow-50 text-sm" placeholder="원화 입력 시 달러 자동계산" /></div>
                    <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_USD ($)</label><input type="number" name="priceUSD" value={form.priceUSD} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-gray-100 text-sm" placeholder={`원화 ÷ ${currentER}`} /></div>
                    
                    <div className="col-span-1 md:col-span-2 lg:col-span-3 mt-2 text-right">
                      <button type="button" onClick={handleSave} className={`${editingId ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold w-full py-3 rounded shadow transition`}>{editingId ? '수정 완료' : '데이터 신규 저장'}</button>
                      {editingId && <button type="button" onClick={() => { setEditingId(null); setForm(initialForm); }} className="mt-4 text-sm text-gray-500 hover:underline ml-3">수정 취소</button>}
                    </div>
                  </form>

                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-blue-800">✅ 납품 현황 (FCST & ACT)</h4>
                    <div className="overflow-x-auto rounded-lg border border-blue-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-blue-800 text-white font-bold">
                          <tr><th className="p-2 md:p-3">Status</th><th className="p-2 md:p-3">납품일</th><th className="p-2 md:p-3">계약</th><th className="p-2 md:p-3">Type</th><th className="p-2 md:p-3">Dealer</th><th className="p-2 md:p-3">SO</th><th className="p-2 md:p-3">Account</th><th className="p-2 md:p-3">Product</th><th className="p-2 md:p-3">Acc type</th><th className="p-2 md:p-3 text-right">Price (KRW)</th><th className="p-2 md:p-3 text-right">Price (USD)</th><th className="p-2 md:p-3 text-center">관리</th></tr>
                        </thead>
                        <tbody>
                          {salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember && (d.status === 'FCST' || d.status === 'ACT')).length === 0 ? (
                            <tr><td colSpan="12" className="p-6 text-center text-gray-400">등록된 납품 데이터가 없습니다.</td></tr>
                          ) : (
                            salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember && (d.status === 'FCST' || d.status === 'ACT')).map(row => (
                              <tr key={row.id} className={`border-b transition ${row.status === 'ACT' ? 'bg-green-50 hover:bg-green-100' : 'hover:bg-blue-50'}`}>
                                <td className={`p-2 md:p-3 font-bold ${row.status === 'ACT' ? 'text-green-600' : 'text-blue-600'}`}>{row.status}</td>
                                <td className="p-2 md:p-3 text-gray-600">{row.deliveryDate || '-'}</td>
                                <td className="p-2 md:p-3 font-semibold text-emerald-600">{row.contractType || '일반'}</td>
                                <td className="p-2 md:p-3 font-semibold"><span className={`px-2 py-1 rounded text-[10px] md:text-xs ${row.salesType === 'Direct' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>{row.salesType}</span></td>
                                <td className="p-2 md:p-3 font-bold text-purple-700">{row.dealerName || '-'}</td>
                                <td className="p-2 md:p-3 font-mono text-gray-500">{row.so || '-'}</td>
                                <td className="p-2 md:p-3 font-bold text-gray-800">{row.account}</td>
                                <td className="p-2 md:p-3">{row.product}</td>
                                <td className="p-2 md:p-3 text-gray-500">{row.accType}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">₩ {row.priceKRW.toLocaleString()}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">$ {row.priceUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                <td className="p-2 md:p-3 text-center space-x-1"><button onClick={() => handleEdit(row)} className="text-[10px] md:text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-2 py-1 rounded font-bold transition">수정</button><button onClick={() => deleteSalesData(row.id)} className="text-[10px] md:text-xs bg-red-100 hover:bg-red-200 text-red-600 px-2 py-1 rounded font-bold transition">삭제</button></td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-red-700">🚨 미납 리스트 (Pending / Backlog)</h4>
                    <div className="overflow-x-auto rounded-lg border border-red-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-red-700 text-white font-bold">
                          <tr><th className="p-2 md:p-3">Status</th><th className="p-2 md:p-3">납품일</th><th className="p-2 md:p-3">계약</th><th className="p-2 md:p-3">Type</th><th className="p-2 md:p-3">Dealer</th><th className="p-2 md:p-3">SO</th><th className="p-2 md:p-3">Account</th><th className="p-2 md:p-3">Product</th><th className="p-2 md:p-3">Acc type</th><th className="p-2 md:p-3 text-right">Price (KRW)</th><th className="p-2 md:p-3 text-right">Price (USD)</th><th className="p-2 md:p-3 text-center">관리</th></tr>
                        </thead>
                        <tbody>
                          {salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember && d.status === '미납').length === 0 ? (
                            <tr><td colSpan="12" className="p-6 text-center text-gray-400">등록된 미납 데이터가 없습니다.</td></tr>
                          ) : (
                            salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember && d.status === '미납').map(row => (
                              <tr key={row.id} className="border-b bg-red-50 hover:bg-red-100 transition">
                                <td className="p-2 md:p-3 font-bold text-red-600">{row.status}</td>
                                <td className="p-2 md:p-3 text-gray-600">{row.deliveryDate || '-'}</td>
                                <td className="p-2 md:p-3 font-semibold text-emerald-600">{row.contractType || '일반'}</td>
                                <td className="p-2 md:p-3 font-semibold"><span className={`px-2 py-1 rounded text-[10px] md:text-xs ${row.salesType === 'Direct' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>{row.salesType}</span></td>
                                <td className="p-2 md:p-3 font-bold text-purple-700">{row.dealerName || '-'}</td>
                                <td className="p-2 md:p-3 font-mono text-gray-500">{row.so || '-'}</td>
                                <td className="p-2 md:p-3 font-bold text-gray-800">{row.account}</td>
                                <td className="p-2 md:p-3">{row.product}</td>
                                <td className="p-2 md:p-3 text-gray-500">{row.accType}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">₩ {row.priceKRW.toLocaleString()}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">$ {row.priceUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                <td className="p-2 md:p-3 text-center space-x-1"><button onClick={() => handleEdit(row)} className="text-[10px] md:text-xs bg-red-200 hover:bg-red-300 text-red-800 px-2 py-1 rounded font-bold transition">수정</button><button onClick={() => deleteSalesData(row.id)} className="text-[10px] md:text-xs bg-red-100 hover:bg-red-200 text-red-600 px-2 py-1 rounded font-bold transition">삭제</button></td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
