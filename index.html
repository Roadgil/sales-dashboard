<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영업 납품처 FCST Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // 🔥 대표님의 파이어베이스 고유 열쇠 적용 완료! 🔥
    // =========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDpdX6I7fkE1m9jQDARg5l4Skv3vhD7iyI",
      authDomain: "sales-dashboard-d0d13.firebaseapp.com",
      projectId: "sales-dashboard-d0d13",
      storageBucket: "sales-dashboard-d0d13.firebasestorage.app",
      messagingSenderId: "870275096697",
      appId: "1:870275096697:web:cd7373b77358681e21b4a8",
      measurementId: "G-K5G6BMNBX9"
    };

    // 파이어베이스 실행
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const { useState, useEffect } = React;

    const App = () => {
      const [quarters, setQuarters] = useState(['2026 Q1', '2026 Q2']);
      const [selectedQuarter, setSelectedQuarter] = useState('2026 Q2');
      
      const [teams, setTeams] = useState({
        'Team 1': ['Kim SH', 'Oh SG'],
        'Team 2': ['Baek SC', 'Lee GR'],
        'Team 3': ['YC lim']
      });
      const [selectedTeam, setSelectedTeam] = useState('Team 1');
      const [selectedMember, setSelectedMember] = useState(null);
      const [activeStatTab, setActiveStatTab] = useState('product'); 

      const [memberTargets, setMemberTargets] = useState({
        'Kim SH': 1500000000, 'Oh SG': 1200000000, 'Baek SC': 1300000000, 'Lee GR': 1000000000, 'YC lim': 1000000000,
      });

      const [quarterTargets, setQuarterTargets] = useState({
        '2026 Q1': { target: 0, gmppTarget: 0, er: 1389 },
        '2026 Q2': { target: 7255198319, gmppTarget: 4550036400, er: 1389 }
      });
      const [salesData, setSalesData] = useState([]);

      const initialForm = { status: 'FCST', contractType: '일반', deliveryDate: '', so: '', account: '', product: 'GMPP', accType: '', priceKRW: '', priceUSD: '', salesType: 'Direct', dealerName: '' };
      const [form, setForm] = useState(initialForm);
      const [editingId, setEditingId] = useState(null);

      // 데이터 실시간 로드
      useEffect(() => {
        const unsubscribeSales = db.collection("sales").onSnapshot((snapshot) => {
          const data = snapshot.docs.map(doc => doc.data());
          setSalesData(data);
        });
        const unsubscribeTargets = db.collection("targets").doc("quarterTargets").onSnapshot((doc) => {
          if (doc.exists) setQuarterTargets(doc.data());
        });
        const unsubscribeMemberTargets = db.collection("targets").doc("memberTargets").onSnapshot((doc) => {
          if (doc.exists) setMemberTargets(doc.data());
        });
        return () => { unsubscribeSales(); unsubscribeTargets(); unsubscribeMemberTargets(); };
      }, []);

      const handleSave = () => {
        if(!form.account) return alert('Account명(납품처)을 입력해주세요.');
        const payload = {
          ...form,
          priceKRW: Number(form.priceKRW) || 0,
          priceUSD: Number(form.priceUSD) || 0,
          id: editingId ? editingId : Date.now(),
          quarter: selectedQuarter,
          team: selectedTeam,
          member: selectedMember
        };
        db.collection("sales").doc(payload.id.toString()).set(payload);
        setEditingId(null);
        setForm(initialForm);
      };

      const deleteSalesData = (id) => {
        if (window.confirm("이 납품 데이터를 정말 삭제하시겠습니까?")) {
          db.collection("sales").doc(id.toString()).delete();
        }
      };

      const handleEdit = (data) => {
        setForm(data);
        setEditingId(data.id);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (name === 'priceKRW') {
          const er = quarterTargets[selectedQuarter]?.er || 1389;
          const krwValue = value ? parseFloat(value) : 0;
          const usdValue = krwValue ? (krwValue / er).toFixed(2) : '';
          setForm({ ...form, priceKRW: value, priceUSD: usdValue });
        } else {
          setForm({ ...form, [name]: value });
        }
      };

      const currentTargets = quarterTargets[selectedQuarter] || { target: 0, gmppTarget: 0, er: 1389 };
      const expectedData = salesData.filter(d => d.quarter === selectedQuarter && (d.status === 'FCST' || d.status === 'ACT'));
      const expectedKRW = expectedData.reduce((acc, cur) => acc + cur.priceKRW, 0);
      const memberACT = selectedMember ? expectedData.filter(d => d.member === selectedMember).reduce((acc, cur) => acc + cur.priceKRW, 0) : 0;

      const renderProgressBar = (actKRW, targetKRW) => {
        if (!targetKRW) return null;
        const per = (actKRW / targetKRW) * 100;
        return (
          <div className="w-full mt-4">
            <div className="flex justify-between items-end mb-2">
              <span className="text-xs font-bold text-gray-500">누적: ₩ {actKRW.toLocaleString()}</span>
              <span className="text-sm font-extrabold text-blue-600">{per.toFixed(1)}% 달성</span>
            </div>
            <div className="w-full h-4 bg-gray-200 rounded-full overflow-hidden">
              <div className="h-full bg-blue-500 transition-all duration-700" style={{ width: `${Math.min(per, 100)}%` }}></div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex h-screen bg-gray-100 font-sans">
          {/* 사이드바 */}
          <div className="w-64 bg-slate-800 text-white p-5 flex flex-col">
            <h2 className="text-xl font-bold mb-6 text-blue-400">영업 FCST</h2>
            {quarters.map(q => (
              <button key={q} onClick={() => { setSelectedQuarter(q); setSelectedMember(null); }} className={`w-full text-left px-4 py-3 mb-2 rounded font-semibold transition ${selectedQuarter === q ? 'bg-blue-600' : 'hover:bg-slate-700'}`}>{q}</button>
            ))}
          </div>

          <div className="flex-1 p-8 overflow-y-auto">
            <h1 className="text-3xl font-extrabold mb-6 text-gray-800">{selectedQuarter} Dashboard</h1>
            
            {!selectedMember ? (
              <div className="grid grid-cols-1 gap-6">
                <div className="bg-white p-6 rounded-xl shadow-md border">
                  <h3 className="text-xl font-bold mb-4">🏠 분기 전체 현황</h3>
                  {renderProgressBar(expectedKRW, currentTargets.target)}
                </div>
                <div className="flex space-x-2">
                  {Object.keys(teams).map(t => (
                    <button key={t} onClick={() => setSelectedTeam(t)} className={`px-6 py-2 rounded-t-lg font-bold ${selectedTeam === t ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}>{t}</button>
                  ))}
                </div>
                <div className="grid grid-cols-3 gap-4">
                  {teams[selectedTeam].map(m => (
                    <div key={m} onClick={() => setSelectedMember(m)} className="bg-white p-6 rounded-xl border hover:shadow-lg cursor-pointer transition">
                      <div className="text-xl font-bold">{m}</div>
                      <div className="text-sm text-gray-400 mt-2">데이터 관리 &rarr;</div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="bg-white p-8 rounded-xl shadow-md border">
                <button onClick={() => setSelectedMember(null)} className="text-blue-500 mb-4 font-bold">&larr; 목록으로</button>
                <h3 className="text-2xl font-extrabold mb-6">{selectedMember} 납품 관리</h3>
                
                {/* 입력 폼 */}
                <div className="grid grid-cols-3 gap-4 bg-gray-50 p-6 rounded-lg mb-8 border-2 border-dashed">
                  <input type="text" name="account" value={form.account} onChange={handleInputChange} placeholder="납품처명" className="p-2 border rounded" />
                  <select name="status" value={form.status} onChange={handleInputChange} className="p-2 border rounded font-bold">
                    <option value="FCST">FCST</option>
                    <option value="ACT">ACT</option>
                    <option value="미납">미납</option>
                  </select>
                  <input type="number" name="priceKRW" value={form.priceKRW} onChange={handleInputChange} placeholder="금액(₩)" className="p-2 border rounded" />
                  <button onClick={handleSave} className="col-span-3 bg-blue-600 text-white py-3 rounded font-bold">{editingId ? '수정 내용 저장' : '새 데이터 추가'}</button>
                </div>

                {/* 데이터 리스트 */}
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-slate-100 border-b">
                      <tr>
                        <th className="p-3">Status</th>
                        <th className="p-3">Account</th>
                        <th className="p-3 text-right">Price (KRW)</th>
                        <th className="p-3 text-center">관리</th>
                      </tr>
                    </thead>
                    <tbody>
                      {salesData.filter(d => d.quarter === selectedQuarter && d.member === selectedMember).map(row => (
                        <tr key={row.id} className="border-b hover:bg-gray-50">
                          <td className={`p-3 font-bold ${row.status === 'ACT' ? 'text-green-600' : 'text-blue-600'}`}>{row.status}</td>
                          <td className="p-3 font-bold">{row.account}</td>
                          <td className="p-3 text-right">₩ {row.priceKRW.toLocaleString()}</td>
                          <td className="p-3 text-center space-x-2">
                            <button onClick={() => handleEdit(row)} className="text-xs bg-gray-200 px-2 py-1 rounded font-bold">수정</button>
                            <button onClick={() => deleteSalesData(row.id)} className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200">삭제</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
