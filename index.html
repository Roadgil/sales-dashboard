      const handleSave = () => {
        if (isSaving) return;
        const errors = [];
        if (!form.account.trim())                              errors.push(T.valAccount);
        if (!form.status)                                      errors.push(T.valStatus);
        if (!form.dealerName)                                  errors.push(T.valDealer);
        if (!form.deliveryDate)                                errors.push(T.valDelivery);

        if (form.priceKRW !== '' && isNaN(krw))               errors.push(T.valPriceNaN);
        else if (!isNaN(krw) && krw < 0)                      errors.push(T.valPriceNeg);
        else if (!isNaN(krw) && krw > 10_000_000_000)         errors.push(T.valPriceBig);

        if (errors.length > 0) { alert(errors.join('\n')); return; }

        setIsSaving(true);
        const finalKRW = isNaN(krw) ? 0 : Math.round(krw);
        const DIRECT_DEALERS = ['лі‘мӣҗ'];

          status:       String(form.status || ''),

          contractDate: String(form.contractDate || ''),
          deliveryDate: String(form.deliveryDate || ''),
          so:           String(form.so || ''),
          account:      String(form.account || ''),
          product:      String(form.product || 'GMPP'),
          accType:      String(form.accType || ''),
          dealerName:   String(form.dealerName || ''),

          team:         selectedTeam,
          member:       selectedMember,

          .finally(() => setIsSaving(false));

      const handleEdit = (data) => { setForm(data); setEditingId(data.id); window.scrollTo({ top: 0, behavior: 'smooth' }); };

      const editMemberName = (oldName, e) => {

      // в”Җв”Җ [FIX #8] CSV лӮҙліҙлӮҙкё° вҖ” н•„н„° мҳөм…ҳ м§Җмӣҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      const exportToCSV = (mode = 'current') => {
        let data = mode === 'all' ? salesData : salesData.filter(d => d.quarter === selectedQuarter);

        const headers = ['Quarter','Team','Member','Status','Contract Type','Contract Date','Delivery Date','Sales Type','Dealer Name','SO','Account','Product','Acc Type','Price(KRW)','Price(USD)','Ship Confirm'];

      const [showCsvMenu, setShowCsvMenu] = useState(false);

      const handleDragOver  = (e, idx) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverIdx(idx); };
      const handleDrop      = (e, toIdx) => { e.preventDefault(); const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10); if (fromIdx === toIdx) { setDragOverIdx(null); return; } const next = [...cardOrder]; const [moved] = next.splice(fromIdx, 1); next.splice(toIdx, 0, moved); setCardOrder(next); safeLS.set('summaryCardOrder', JSON.stringify(next)); setDragOverIdx(null); };
      const handleDragEnd   = () => setDragOverIdx(null);

      const [allListFilters, setAllListFilters] = useState({ team:[], member:[], status:[], account:[], product:[], dealer:[] });

      const [rowDragState, setRowDragState] = useState({ type:null, fromId:null, overId:null });

      useEffect(() => {
        if (!isLoggedIn) return;
        const unsub = db.collection("settings").doc("rowOrders").onSnapshot(doc => { if (doc.exists) { const d = doc.data(); if (d && typeof d === 'object') setRowOrders(d); } });
        return () => unsub();
      }, [isLoggedIn]);

      const saveRowOrders = (next) => { setRowOrders(next); db.collection("settings").doc("rowOrders").set(next); };
      const getOrderedRows = (status, rawRows) => {
        const key = `${selectedQuarter}__${selectedMember}__${status}`;
        const orderMap = rowOrders[status]?.[key];
        if (!orderMap || !Array.isArray(orderMap) || orderMap.length === 0) return rawRows;
        const mapped = {}; rawRows.forEach(r => { mapped[String(r.id)] = r; });
        const ordered = orderMap.map(id => mapped[id]).filter(Boolean);
        const rest = rawRows.filter(r => !orderMap.includes(String(r.id)));
        return [...ordered, ...rest];
      };
      const handleRowDragStart = (e, status, rowId) => { e.dataTransfer.effectAllowed='move'; setRowDragState({ type:status, fromId:String(rowId), overId:null }); };
      const handleRowDragOver  = (e, status, rowId) => { e.preventDefault(); if (rowDragState.type!==status) return; setRowDragState(s => ({ ...s, overId:String(rowId) })); };
      const handleRowDrop      = (e, status, toRowId, rawRows) => {
        e.preventDefault();
        const { fromId } = rowDragState; const toId = String(toRowId);
        if (!fromId || fromId===toId) { setRowDragState({ type:null, fromId:null, overId:null }); return; }
        const key = `${selectedQuarter}__${selectedMember}__${status}`;
        const rawOrder = rowOrders[status]?.[key];
        const currentOrder = (Array.isArray(rawOrder) ? rawOrder : null) || rawRows.map(r => String(r.id));
        const fi = currentOrder.indexOf(fromId); const ti = currentOrder.indexOf(toId);
        if (fi===-1 || ti===-1) { setRowDragState({ type:null, fromId:null, overId:null }); return; }
        const next = [...currentOrder]; next.splice(fi, 1); next.splice(ti, 0, fromId);
        saveRowOrders({ ...rowOrders, [status]: { ...(rowOrders[status]||{}), [key]: next } });
        setRowDragState({ type:null, fromId:null, overId:null });

            <p style={{color:'#94a3b8',fontSize:'14px',fontWeight:'600'}}>мқёмҰқ нҷ•мқё мӨ‘...</p>
            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
          </div>
        );

      // к°ңмқё Ship Confirm лӢ¬м„ұм№ҳ (Target лҢҖл№„)

                    {editingId && <div className="col-span-full flex justify-between items-center text-blue-600 font-bold mb-3"><span className="text-sm md:text-base">{T.editMode}</span></div>}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.statusLabel} <span className="text-red-500">*</span></label><select name="status" value={form.status} onChange={handleInputChange} className={`w-full p-2 border-2 rounded focus:ring-2 focus:ring-blue-500 outline-none font-bold ${form.status==='Ship Confirm'?'text-white bg-blue-900 border-blue-900':form.status==='Pending'?'text-blue-600 bg-blue-50 border-blue-300':form.status==='Back up'?'text-orange-600 bg-orange-50 border-orange-300':'text-green-600 bg-green-50 border-green-300'}`}><option value="Ship Confirm">рҹҡў Ship Confirm (л§Өм¶ң м§‘кі„)</option><option value="ACT">ACT (лӮ©н’Ҳмҷ„лЈҢ)</option><option value="Pending">Pending (лӮ©н’ҲмҳҲм •)</option><option value="Back up">Back up</option></select></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.contractLabel}</label><select name="contractType" value={form.contractType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold"><option value="мқјл°ҳ">мқјл°ҳ (Normal)</option><option value="Try & Buy">Try &amp; Buy</option></select></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.contractDateLabel}</label><input type="date" name="contractDate" value={form.contractDate} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"/></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.deliveryLabel} <span className="text-red-500">*</span></label><input type="date" name="deliveryDate" value={form.deliveryDate} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Dealer Name <span className="text-red-500">*</span></label><select name="dealerName" value={form.dealerName} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-purple-700">
                        <option value="">{T.selectRequired}</option>
                        <option value="лі‘мӣҗ">лі‘мӣҗ</option>
                        <option value="Innomed">Innomed (мқҙл…ёл©”л“ң)</option>
                        <option value="SEVEN U">SEVEN U (м„ёлёҗмң )</option>
                        <option value="TMI">TMI</option>
                        <option value="м•ҢнҺҷмҠӨл©”л””">м•ҢнҺҷмҠӨл©”л””</option>
                      </select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">SO (Sales Order)</label><input type="text" name="so" value={form.so} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) SO-12345"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.accountLabel} <span className="text-red-500">*</span></label><input type="text" name="account" value={form.account} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) мғӨмқёл№”мқҳмӣҗ к°•м„ң"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Product</label><select name="product" value={form.product} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"><option value="GMPP">GMPP</option><option value="Picoway">Picoway</option><option value="Cryo7">Cryo7</option><option value="VBP">VBP</option><option value="Hand Piece">Hand Piece</option><option value="Nordlys">Nordlys</option><option value="Nordlys Mini">Nordlys Mini</option><option value="GMP">GMP</option></select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Acc type</label><input type="text" name="accType" value={form.accType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) 3, AIO(DCD)"/></div>
                      {/* [FIX #2] min="0" м¶”к°Җ */}
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_KR (вӮ©) <span className="text-red-500">*</span></label><input type="number" min="0" name="priceKRW" value={form.priceKRW} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-yellow-50 text-sm" placeholder={T.krwPlaceholder}/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_USD ($)</label><input type="number" name="priceUSD" value={form.priceUSD} readOnly className="w-full p-2 border border-gray-300 rounded outline-none bg-gray-100 text-sm" placeholder={`мӣҗнҷ” Г· ${currentER}`}/></div>
                    </div>
                    <div className="mt-2 text-right">
                      <button type="button" onClick={handleSave} disabled={isSaving} className={`${editingId?'bg-green-600 hover:bg-green-700':'bg-blue-600 hover:bg-blue-700'} disabled:opacity-60 text-white font-bold w-full py-3 rounded shadow transition flex items-center justify-center gap-2`}>
                        {isSaving && <span style={{width:'16px',height:'16px',border:'2px solid rgba(255,255,255,0.4)',borderTop:'2px solid white',borderRadius:'50%',animation:'spin 0.8s linear infinite',display:'inline-block'}}/>}
                        {editingId ? T.saveEdit : T.saveNew}
                      </button>
                      {editingId && <button type="button" onClick={()=>{setEditingId(null);setForm(initialForm);}} className="mt-4 text-sm text-gray-500 hover:underline ml-3">{T.cancelEdit}</button>}
                    </div>
                  </form>

                  {/* Ship Confirm мҷ„лЈҢ н…Ңмқҙлё” (л§Ё мң„) */}
                  <div className="mt-8">
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between mb-3 gap-2">
                      <h4 className="text-lg md:text-xl font-bold flex items-center gap-2" style={{color:'#1d4ed8'}}>
                        рҹҡў {T.shipConfirmList}
                        <span className="text-sm font-normal text-gray-500">({shipConfirmCount}{T.cases})</span>
                      </h4>
                      <div className="flex flex-wrap gap-2">
                        <div className="bg-blue-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow">
                          {lang==='ko'?'лҲ„м Ғ лӢ¬м„ұм№ҳ':'Cumulative'}: вӮ© {shipConfirmKRW.toLocaleString()}
                        </div>
                        <div className="bg-teal-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow">
                          USD: $ {shipConfirmUSD.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
                        </div>
                        {targetKRW > 0 && <div className={`px-3 py-1.5 rounded-lg text-xs font-bold shadow text-white ${shipConfirmPct>=100?'bg-green-600':shipConfirmPct>=80?'bg-blue-600':shipConfirmPct>=50?'bg-amber-600':'bg-red-500'}`}>
                          Target лҢҖл№„: {shipConfirmPct.toFixed(1)}%
                        </div>}
                      </div>
                    </div>
                    <div className="overflow-x-auto rounded-lg border border-blue-900 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead style={{background:'#1e3a8a'}} className="text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Ship Confirm'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noShipConfirm}</td></tr> : rawRows.map(r=>renderTableRow(r,'ACT','bg-blue-50','bg-blue-200 hover:bg-blue-300 text-blue-900',true)); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* ACT н…Ңмқҙлё” */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-blue-800">{T.deliveryStatus}</h4>
                    <div className="overflow-x-auto rounded-lg border border-blue-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-blue-800 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='ACT'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noDelivery}</td></tr> : getOrderedRows('ACT',rawRows).map(r=>renderTableRow(r,'ACT','bg-green-50','bg-gray-200 hover:bg-gray-300 text-gray-700')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Pending н…Ңмқҙлё” */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-blue-700">{T.pendingList}</h4>
                    <div className="overflow-x-auto rounded-lg border border-blue-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-blue-700 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Pending'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noPending}</td></tr> : getOrderedRows('Pending',rawRows).map(r=>renderTableRow(r,'Pending','bg-blue-50','bg-blue-200 hover:bg-blue-300 text-blue-800')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Backup н…Ңмқҙлё” */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-orange-600">{T.backupList}</h4>
                    <div className="overflow-x-auto rounded-lg border border-orange-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-orange-500 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Back up'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noBackup}</td></tr> : getOrderedRows('Backup',rawRows).map(r=>renderTableRow(r,'Backup','bg-orange-50','bg-orange-200 hover:bg-orange-300 text-orange-800')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>



                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    html, body { overflow-x: hidden; max-width: 100vw; }
    .main-content { min-width: 0; overflow-x: hidden; }
    @media (max-width: 768px) {
      .overflow-x-auto { -webkit-overflow-scrolling: touch; }
      table { font-size: 11px; }
    }
  </style>
</body>
</html>
