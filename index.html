                </>

                                  return (
                                    <label key={val} style={{display:'flex',alignItems:'center',gap:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'11px',color:'#334155',borderBottom:'1px solid #f8fafc'}} className="hover:bg-blue-50">
                                      <input type="checkbox" checked={checked} onChange={()=>toggleAllListFilter(col,val)} style={{width:'13px',height:'13px',cursor:'pointer',accentColor:'#2563eb'}}/>
                                      <span style={{flex:1,fontWeight:checked?'700':'500'}}>{val}</span>
                                      <span style={{fontSize:'10px',color:'#94a3b8',fontWeight:'600'}}>{count}</span>
                                    </label>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </th>
                      );
                    };
                    return (
                      <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="text-lg md:text-xl font-bold text-gray-700 flex items-center gap-2">📋 {lang==='ko'?'전체 리스트':'All List'}<span className="text-sm text-gray-400 font-normal">({selectedQuarter})</span></h3>
                          <div className="flex items-center gap-2">
                            {hasAnyFilter && <button onClick={clearAllListFilters} className="text-xs font-bold px-3 py-1 rounded-full bg-amber-100 text-amber-700 border border-amber-300 hover:bg-amber-200 transition">🗑 {lang==='ko'?'필터 초기화':'Clear Filters'}</button>}
                            <span className="text-xs text-gray-400 font-semibold bg-gray-100 px-3 py-1 rounded-full">{filteredRows.length}{hasAnyFilter?` / ${baseRows.length}`:''}{lang==='ko'?'건':' items'}</span>
                          </div>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                          <div className="overflow-x-auto hide-scrollbar">
                            <table className="min-w-full text-xs text-left whitespace-nowrap">
                              <thead>
                                <tr className="bg-slate-700 text-white">
                                  <ColHeader col="team"      label="Team"/>
                                  <ColHeader col="member"    label={lang==='ko'?'멤버':'Member'}/>
                                  <ColHeader col="status"    label="Status"/>
                                  <ColHeader col="account"   label="Account"/>
                                  <ColHeader col="product"   label="Product"/>
                                  <ColHeader col="dealer"    label="Dealer"/>
                                  <th className="px-3 py-2 font-bold text-right">Price (KRW)</th>
                                </tr>
                              </thead>
                              <tbody>
                                {filteredRows.length===0 ? <tr><td colSpan="7" className="px-3 py-8 text-center text-gray-400">{lang==='ko'?'조건에 맞는 데이터가 없습니다.':'No matching data.'}</td></tr> : (
                                  filteredRows.map((row,i) => {
                                    const sc = STATUS_COLOR[row.status]||{ row:'', badge:'bg-gray-100 text-gray-600' };
                                    return (
                                      <tr key={row.id||i} className={`border-b ${sc.row} hover:brightness-95 transition cursor-pointer`} onClick={()=>{ setSelectedTeam(row.team||selectedTeam); setSelectedMember(row.member); }}>
                                        <td className="px-3 py-2 font-semibold text-slate-600">{row.team||'-'}</td>
                                        <td className="px-3 py-2 font-bold text-gray-800">{row.member}</td>
                                        <td className="px-3 py-2"><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${sc.badge}`}>{row.status}</span></td>
                                        <td className="px-3 py-2 font-semibold text-gray-700 max-w-[140px] truncate" title={row.account}>{row.account}</td>
                                        <td className="px-3 py-2 text-gray-600">{row.product}</td>
                                        <td className="px-3 py-2 text-purple-700 font-semibold">{row.dealerName||'-'}</td>
                                        <td className="px-3 py-2 text-right font-mono text-gray-700">₩ {(row.priceKRW||0).toLocaleString()}</td>
                                      </tr>
                                    );
                                  })
                                )}
                              </tbody>
                              {filteredRows.length>0 && (
                                <tfoot>
                                  <tr className="bg-slate-50 border-t-2 border-slate-200">
                                    <td colSpan="6" className="px-3 py-2 font-bold text-slate-600 text-xs">{lang==='ko'?'합계':'Total'} ({filteredRows.length}{lang==='ko'?'건':' items'})</td>
                                    <td className="px-3 py-2 text-right font-mono font-extrabold text-slate-800">₩ {filteredRows.reduce((s,d)=>s+(d.priceKRW||0),0).toLocaleString()}</td>
                                  </tr>
                                </tfoot>
                              )}
                            </table>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            ) : (
              // ── 멤버 상세 뷰 ────────────────────────────────────────────────
              <div>
                <button onClick={() => { setSelectedMember(null); setEditingId(null); setForm(initialForm); }} className="mb-4 flex items-center bg-slate-700 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-slate-800 transition">
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                  {T.backBtn}
                </button>

                <div className="bg-white p-4 md:p-8 rounded-xl shadow-md border border-gray-100 mb-8">
                  <h3 className="text-2xl md:text-3xl font-extrabold text-gray-800 mb-6">{selectedMember} <span className="text-lg md:text-xl text-gray-500 font-medium block md:inline mt-1 md:mt-0">Account FCST</span></h3>

                  {memberTargets[selectedMember] !== undefined && (
                    <div className="bg-blue-50/50 p-4 md:p-6 rounded-lg border border-blue-100 mb-8">
                      <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-4">
                        <h4 className="font-bold text-base md:text-lg text-gray-700 mb-4 lg:mb-0">{T.cumulative}</h4>
                        <div className="flex flex-wrap gap-2 lg:gap-3 w-full lg:w-auto">
                          <div className="flex flex-col bg-white px-2 py-2 rounded shadow-sm border-l-4 border-gray-500 border-2 flex-1 lg:flex-none">
                            <span className="text-[10px] text-gray-500 block font-bold mb-1">{T.target100label}</span>
                            <div className="flex items-center"><span className="font-bold text-sm mr-1 text-gray-700">₩</span><input type="number" min="0" value={memberTargets[selectedMember]===0?'':memberTargets[selectedMember]} onChange={e=>handleMemberTargetChange(selectedMember,e.target.value)} className="w-full md:w-28 bg-transparent border-b border-gray-300 font-mono font-bold text-sm md:text-[15px] outline-none focus:border-blue-500 text-gray-800 transition text-right" placeholder={T.targetPlaceholder2}/></div>
                          </div>
                          <div className="flex flex-col justify-center bg-white px-2 md:px-3 py-2 h-auto md:h-[52px] rounded shadow-sm border-l-4 border-green-500 flex-1 lg:flex-none"><span className="text-[10px] text-green-600 block font-bold">120% Target</span><span className="font-bold text-xs md:text-sm text-green-700 text-right">₩ {(memberTargets[selectedMember]*1.2).toLocaleString()}</span></div>
                          <div className="flex flex-col justify-center bg-white px-2 md:px-3 py-2 h-auto md:h-[52px] rounded shadow-sm border-l-4 border-purple-500 flex-1 lg:flex-none"><span className="text-[10px] text-purple-600 block font-bold">140% Target</span><span className="font-bold text-xs md:text-sm text-purple-700 text-right">₩ {(memberTargets[selectedMember]*1.4).toLocaleString()}</span></div>
                          <div className="flex flex-col justify-center bg-white px-2 md:px-3 py-2 h-auto md:h-[52px] rounded shadow-sm border-l-4 border-orange-500 flex-1 lg:flex-none"><span className="text-[10px] text-orange-500 block font-bold">150% Target</span><span className="font-bold text-xs md:text-sm text-orange-600 text-right">₩ {(memberTargets[selectedMember]*1.5).toLocaleString()}</span></div>
                        </div>
                      </div>
                      {renderProgressBar(memberSCKRW, memberTargets[selectedMember])}
                    </div>
                  )}

                  {/* [FIX #2] 입력 폼 — min="0" 추가, 저장 중 비활성화 */}
                  <form className={`bg-slate-50 p-4 md:p-6 rounded-lg border-2 transition ${editingId?'border-blue-400 bg-blue-50':'border-gray-200'}`}>
                    {editingId && <div className="col-span-full flex justify-between items-center text-blue-600 font-bold mb-3"><span className="text-sm md:text-base">{T.editMode}</span></div>}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.statusLabel} <span className="text-red-500">*</span></label><select name="status" value={form.status} onChange={handleInputChange} className={`w-full p-2 border-2 rounded focus:ring-2 focus:ring-blue-500 outline-none font-bold ${form.status==='Ship Confirm'?'text-white bg-blue-900 border-blue-900':form.status==='Pending'?'text-blue-600 bg-blue-50 border-blue-300':form.status==='Back up'?'text-orange-600 bg-orange-50 border-orange-300':'text-green-600 bg-green-50 border-green-300'}`}><option value="Ship Confirm">🚢 Ship Confirm (매출 집계)</option><option value="ACT">ACT (납품완료)</option><option value="Pending">Pending (납품예정)</option><option value="Back up">Back up</option></select></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.contractLabel}</label><select name="contractType" value={form.contractType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold"><option value="일반">일반 (Normal)</option><option value="Try & Buy">Try &amp; Buy</option></select></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.contractDateLabel}</label><input type="date" name="contractDate" value={form.contractDate} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"/></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.deliveryLabel} <span className="text-red-500">*</span></label><input type="date" name="deliveryDate" value={form.deliveryDate} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Dealer Name <span className="text-red-500">*</span></label><select name="dealerName" value={form.dealerName} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-purple-700">
                        <option value="">{T.selectRequired}</option>
                        <option value="병원">병원</option>
                        <option value="Innomed">Innomed (이노메드)</option>
                        <option value="SEVEN U">SEVEN U (세븐유)</option>
                        <option value="TMI">TMI</option>
                        <option value="알펙스메디">알펙스메디</option>
                      </select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">SO (Sales Order)</label><input type="text" name="so" value={form.so} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) SO-12345"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">{T.accountLabel} <span className="text-red-500">*</span></label><input type="text" name="account" value={form.account} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) 샤인빔의원 강서"/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Product</label><select name="product" value={form.product} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"><option value="GMPP">GMPP</option><option value="Picoway">Picoway</option><option value="Cryo7">Cryo7</option><option value="VBP">VBP</option><option value="Hand Piece">Hand Piece</option><option value="Nordlys">Nordlys</option><option value="Nordlys Mini">Nordlys Mini</option><option value="GMP">GMP</option></select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 mb-4 md:mb-5">
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">Acc type</label><input type="text" name="accType" value={form.accType} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="ex) 3, AIO(DCD)"/></div>
                      {/* [FIX #2] min="0" 추가 */}
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_KR (₩) <span className="text-red-500">*</span></label><input type="number" min="0" name="priceKRW" value={form.priceKRW} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-yellow-50 text-sm" placeholder={T.krwPlaceholder}/></div>
                      <div><label className="block text-xs md:text-sm font-bold text-gray-700 mb-1">System Price_USD ($)</label><input type="number" name="priceUSD" value={form.priceUSD} readOnly className="w-full p-2 border border-gray-300 rounded outline-none bg-gray-100 text-sm" placeholder={`원화 ÷ ${currentER}`}/></div>
                    </div>
                    <div className="mt-2 text-right">
                      <button type="button" onClick={handleSave} disabled={isSaving} className={`${editingId?'bg-green-600 hover:bg-green-700':'bg-blue-600 hover:bg-blue-700'} disabled:opacity-60 text-white font-bold w-full py-3 rounded shadow transition flex items-center justify-center gap-2`}>
                        {isSaving && <span style={{width:'16px',height:'16px',border:'2px solid rgba(255,255,255,0.4)',borderTop:'2px solid white',borderRadius:'50%',animation:'spin 0.8s linear infinite',display:'inline-block'}}/>}
                        {editingId ? T.saveEdit : T.saveNew}
                      </button>
                      {editingId && <button type="button" onClick={()=>{setEditingId(null);setForm(initialForm);}} className="mt-4 text-sm text-gray-500 hover:underline ml-3">{T.cancelEdit}</button>}
                    </div>
                  </form>

                  {/* Ship Confirm 완료 테이블 (맨 위) */}
                  <div className="mt-8">
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between mb-3 gap-2">
                      <h4 className="text-lg md:text-xl font-bold flex items-center gap-2" style={{color:'#1d4ed8'}}>
                        🚢 {T.shipConfirmList}
                        <span className="text-sm font-normal text-gray-500">({shipConfirmCount}{T.cases})</span>
                      </h4>
                      <div className="flex flex-wrap gap-2">
                        <div className="bg-blue-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow">
                          {lang==='ko'?'누적 달성치':'Cumulative'}: ₩ {shipConfirmKRW.toLocaleString()}
                        </div>
                        <div className="bg-teal-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow">
                          USD: $ {shipConfirmUSD.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
                        </div>
                        {targetKRW > 0 && <div className={`px-3 py-1.5 rounded-lg text-xs font-bold shadow text-white ${shipConfirmPct>=100?'bg-green-600':shipConfirmPct>=80?'bg-blue-600':shipConfirmPct>=50?'bg-amber-600':'bg-red-500'}`}>
                          Target 대비: {shipConfirmPct.toFixed(1)}%
                        </div>}
                      </div>
                    </div>
                    <div className="overflow-x-auto rounded-lg border border-blue-900 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead style={{background:'#1e3a8a'}} className="text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Ship Confirm'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noShipConfirm}</td></tr> : rawRows.map(r=>renderTableRow(r,'ACT','bg-blue-50','bg-blue-200 hover:bg-blue-300 text-blue-900',true)); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* ACT 테이블 */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-blue-800">{T.deliveryStatus}</h4>
                    <div className="overflow-x-auto rounded-lg border border-blue-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-blue-800 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='ACT'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noDelivery}</td></tr> : getOrderedRows('ACT',rawRows).map(r=>renderTableRow(r,'ACT','bg-green-50','bg-gray-200 hover:bg-gray-300 text-gray-700')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Pending 테이블 */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-blue-700">{T.pendingList}</h4>
                    <div className="overflow-x-auto rounded-lg border border-blue-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-blue-700 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Pending'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noPending}</td></tr> : getOrderedRows('Pending',rawRows).map(r=>renderTableRow(r,'Pending','bg-blue-50','bg-blue-200 hover:bg-blue-300 text-blue-800')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Backup 테이블 */}
                  <div className="mt-10">
                    <h4 className="text-lg md:text-xl font-bold mb-3 flex items-center text-orange-600">{T.backupList}</h4>
                    <div className="overflow-x-auto rounded-lg border border-orange-200 hide-scrollbar">
                      <table className="min-w-full text-xs md:text-sm text-left whitespace-nowrap">
                        <thead className="bg-orange-500 text-white font-bold"><TABLE_TH/></thead>
                        <tbody>
                          {(() => { const rawRows = salesData.filter(d=>d.quarter===selectedQuarter&&d.member===selectedMember&&d.status==='Back up'); return rawRows.length===0 ? <tr><td colSpan="12" className="p-6 text-center text-gray-400">{T.noBackup}</td></tr> : getOrderedRows('Backup',rawRows).map(r=>renderTableRow(r,'Backup','bg-orange-50','bg-orange-200 hover:bg-orange-300 text-orange-800')); })()}
                        </tbody>
                      </table>
                    </div>
                  </div>



                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    html, body { overflow-x: hidden; max-width: 100vw; }
    .main-content { min-width: 0; overflow-x: hidden; }
    @media (max-width: 768px) {
      .overflow-x-auto { -webkit-overflow-scrolling: touch; }
      table { font-size: 11px; }
    }
  </style>
</body>
</html>
