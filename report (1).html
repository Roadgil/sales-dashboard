<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대표님 보고용 리포트 (Sales Progress)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <!-- 공통 모듈 -->
  <script src="firebase-init.js"></script>
  <script src="common-utils.js"></script>
  <script src="lang.js"></script>

  <style>
    body { background-color: #f1f5f9; font-family: 'Arial', sans-serif; }
    .excel-container { overflow-x: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;}
    .excel-table { border-collapse: collapse; white-space: nowrap; width: max-content; }
    .excel-table th, .excel-table td { border: 1px solid #94a3b8; padding: 6px 12px; font-size: 12px; text-align: right; }
    .excel-table th { background-color: #dbeafe; color: #1e293b; font-weight: bold; text-align: center; }
    .excel-table .header-dark { background-color: #1e293b; color: white; border-color: #334155; }
    .text-left { text-align: left !important; }
    .text-center { text-align: center !important; }
    .bg-yellow { background-color: #fef9c3 !important; }
    .bg-blue { background-color: #e0f2fe !important; }
    .bg-red-light { background-color: #fee2e2 !important; }
    .text-red { color: #dc2626 !important; font-weight: bold; }
    .text-blue { color: #2563eb !important; font-weight: bold; }
    .font-bold { font-weight: bold !important; }
    ::-webkit-scrollbar { height: 10px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 5px; }
    .week-date-label {
      display: block; font-size: 9px; font-weight: normal;
      color: #1e293b; margin-top: 3px; letter-spacing: 0.2px;
    }
    .progress-cell { background-color: #eff6ff !important; color: #1d4ed8 !important; font-weight: bold !important; }
    .auth-loading {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:14px;
      color:#64748b; font-size:13px;
    }
    .spinner { width:36px; height:36px; border:3px solid #e2e8f0; border-top-color:#2563eb; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // 공통 모듈에서 가져오기
    const { db, auth } = window;
    const {
      filterRevenueRows,
      parseQuarter,
      getMonthIdx,
      getWeekIdx,
      showToast,
      safeRun
    } = window.AppCommon;
    const { useState, useEffect } = React;

    const LangBtn = ({ lang, setLang }) => (
      <button
        onClick={() => { const next = lang === 'ko' ? 'en' : 'ko'; setLang(next); localStorage.setItem('lang', next); }}
        style={{ position:'fixed', top:'16px', right:'16px', zIndex:9999,
          padding:'6px 14px', borderRadius:'20px', border:'1.5px solid #94a3b8',
          background:'white', cursor:'pointer', fontWeight:'bold', fontSize:'12px',
          boxShadow:'0 2px 8px rgba(0,0,0,0.12)', display:'flex', alignItems:'center', gap:'6px' }}
      >
        {lang === 'ko' ? '🇺🇸 EN' : '🇰🇷 KO'}
      </button>
    );

    const ReportApp = () => {
      const [lang, setLang] = useState(localStorage.getItem('lang') || 'ko');

      // ── Firebase Auth 상태 ─────────────────────────────────
      const [currentUser, setCurrentUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [emailInput, setEmailInput] = useState('');
      const [pwdInput, setPwdInput] = useState('');
      const [authError, setAuthError] = useState('');

      const isLoggedIn = !!currentUser;

      const T = {
        loginTitle:   lang==='ko' ? '📈 보고용 리포트 (로그인 필요)' : '📈 Sales Report (Login Required)',
        loginSub:     lang==='ko' ? 'Dashboard와 동일한 계정으로 로그인해주세요.' : 'Please log in with the same account as Dashboard.',
        loginBtn:     lang==='ko' ? '접속하기'                  : 'Log In',
        emailLabel:   lang==='ko' ? '이메일'                    : 'Email',
        pwdLabel:     lang==='ko' ? '비밀번호'                  : 'Password',
        logoutBtn:    lang==='ko' ? '로그아웃'                  : 'Log Out',
        closeBtn:     lang==='ko' ? '닫기'                      : 'Close',
        unitSuffix:   lang==='ko' ? '대'                        : 'unit(s)',
        loading:      lang==='ko' ? '로그인 정보 확인 중...'     : 'Checking authentication...',
        loadFail:     lang==='ko' ? '데이터를 불러오지 못했습니다.' : 'Failed to load data.',
      };

      const [quarters, setQuarters] = useState(['2026 Q1', '2026 Q2']);
      // dashboard 기본값과 통일: 2026 Q2
      const [selectedQuarter, setSelectedQuarter] = useState(
        new URLSearchParams(window.location.search).get('quarter') || '2026 Q2'
      );
      const [salesData, setSalesData] = useState([]);
      const [quarterTargets, setQuarterTargets] = useState({});
      const [memberTargets, setMemberTargets] = useState({});
      const [teams, setTeams] = useState({
        'Team 1': ['Kim SH', 'Oh SG'],
        'Team 2': ['Baek SC', 'Lee GR'],
        'Team 3': ['YC lim']
      });

      // ── Firebase Auth ──────────────────────────────────────
      useEffect(() => {
        if (!auth) { setAuthLoading(false); return; }
        const unsub = auth.onAuthStateChanged(user => {
          setCurrentUser(user);
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        try {
          await auth.signInWithEmailAndPassword(emailInput, pwdInput);
        } catch (err) {
          const msgMap = {
            'auth/user-not-found':    lang==='ko' ? '등록되지 않은 이메일입니다.' : 'Email not registered.',
            'auth/wrong-password':    lang==='ko' ? '비밀번호가 틀렸습니다.' : 'Incorrect password.',
            'auth/invalid-email':     lang==='ko' ? '이메일 형식이 올바르지 않습니다.' : 'Invalid email format.',
            'auth/too-many-requests': lang==='ko' ? '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.' : 'Too many attempts. Please try again later.',
            'auth/invalid-credential':lang==='ko' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : 'Invalid email or password.',
          };
          setAuthError(msgMap[err.code] || (lang==='ko' ? '로그인에 실패했습니다.' : 'Login failed.'));
        }
      };

      const handleLogout = async () => {
        await safeRun(() => auth.signOut(), {
          successMsg: lang==='ko' ? '로그아웃되었습니다.' : 'Logged out.',
          errorMsg:   lang==='ko' ? '로그아웃에 실패했습니다.' : 'Logout failed.'
        });
      };

      // 주차별 날짜 자동 계산
      const getWeekRanges = (year, month) => {
        const pad = (n) => String(n).padStart(2, '0');
        const lastDay = new Date(year, month, 0).getDate();
        const ranges = [
          `${pad(month)}/01~${pad(month)}/07`,
          `${pad(month)}/08~${pad(month)}/14`,
          `${pad(month)}/15~${pad(month)}/21`,
          `${pad(month)}/22~${pad(month)}/28`,
        ];
        if (lastDay >= 29) ranges.push(`${pad(month)}/29~${pad(month)}/${lastDay}`);
        else ranges.push(null);
        return ranges;
      };

      // ── Firestore 구독 ─────────────────────────────────────
      useEffect(() => {
        if (!isLoggedIn) return;

        const unsubs = [];
        try {
          // 분기별로 query를 좁혀서 부하 감소
          unsubs.push(
            db.collection("sales")
              .where("quarter", "==", selectedQuarter)
              .onSnapshot(
                (snap) => setSalesData(snap.docs.map(doc => doc.data())),
                (err) => { console.error(err); showToast(T.loadFail, 'error'); }
              )
          );
          unsubs.push(
            db.collection("targets").doc("quarterTargets").onSnapshot(
              (doc) => { if(doc.exists) setQuarterTargets(doc.data()); },
              (err) => { console.error(err); showToast(T.loadFail, 'error'); }
            )
          );
          unsubs.push(
            db.collection("targets").doc("memberTargets").onSnapshot(
              (doc) => { if(doc.exists) setMemberTargets(doc.data()); },
              (err) => { console.error(err); showToast(T.loadFail, 'error'); }
            )
          );
          unsubs.push(
            db.collection("settings").doc("layout").onSnapshot(
              (doc) => {
                if (doc.exists) {
                  const data = doc.data();
                  if (data.teams) setTeams(data.teams);
                  if (data.quarters) setQuarters(data.quarters);
                }
              },
              (err) => { console.error(err); showToast(T.loadFail, 'error'); }
            )
          );
        } catch (e) {
          console.error(e);
          showToast(T.loadFail, 'error');
        }

        return () => unsubs.forEach(u => { try { u(); } catch(e){} });
      }, [isLoggedIn, selectedQuarter]);

      if (authLoading) {
        return (
          <div className="auth-loading">
            <div className="spinner"></div>
            <div>{T.loading}</div>
          </div>
        );
      }

      if (!isLoggedIn) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-800 px-4">
            <LangBtn lang={lang} setLang={setLang} />
            <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm w-full">
              <h2 className="text-xl font-bold mb-2">{T.loginTitle}</h2>
              <p className="text-xs text-slate-500 mb-5">{T.loginSub}</p>
              <input
                type="email"
                value={emailInput}
                onChange={(e) => setEmailInput(e.target.value)}
                className="w-full p-3 border rounded-lg mb-3 text-sm"
                placeholder={T.emailLabel}
                autoComplete="username"
                required
              />
              <input
                type="password"
                value={pwdInput}
                onChange={(e) => setPwdInput(e.target.value)}
                className="w-full p-3 border rounded-lg mb-3 text-sm"
                placeholder={T.pwdLabel}
                autoComplete="current-password"
                required
              />
              {authError && (
                <div className="text-red-600 text-xs mb-3 text-left">{authError}</div>
              )}
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition">
                {T.loginBtn}
              </button>
            </form>
          </div>
        );
      }

      // 분기/월/주차 계산
      const parsed = parseQuarter(selectedQuarter) || { year: 2026, months:[1,2,3] };
      const [m1, m2, m3] = parsed.months;
      const monthNames = ['', 'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const m1Name = monthNames[m1], m2Name = monthNames[m2], m3Name = monthNames[m3];
      const year = parsed.year;
      const weekRangesM1 = getWeekRanges(year, m1);
      const weekRangesM2 = getWeekRanges(year, m2);
      const weekRangesM3 = getWeekRanges(year, m3);

      const toM = (val) => val / 1000000;
      const formatM = (val) => val === 0 ? '-' : val.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
      const formatP = (val) => (val * 100).toFixed(1) + '%';
      const formatPct = (num, den) => den > 0 ? (num / den * 100).toFixed(1) + '%' : '-';

      // ★★★ 매출 집계 기준 = ACT + Pending (Back up/미납 제외) ★★★
      const currentQData = filterRevenueRows(
        salesData.filter(d => d.quarter === selectedQuarter)
      );

      let rows = [];
      Object.entries(teams).sort(([a], [b]) => a.localeCompare(b)).forEach(([team, members]) => {
        members.forEach(member => {
          const mData = currentQData.filter(d => d.member === member);

          const calcMonth = (m) => mData.filter(d => getMonthIdx(d.deliveryDate) === m).reduce((a,b)=>a+toM(b.priceKRW||0),0);
          const calcWeek = (m, w) => mData.filter(d => getMonthIdx(d.deliveryDate) === m && getWeekIdx(d.deliveryDate) === w).reduce((a,b)=>a+toM(b.priceKRW||0),0);

          const valM1 = calcMonth(m1);
          const valM2 = calcMonth(m2);
          const valM3 = calcMonth(m3);
          const valTBD = mData.filter(d => getMonthIdx(d.deliveryDate) === -1).reduce((a,b)=>a+toM(b.priceKRW||0),0);

          const total = valM1 + valM2 + valM3 + valTBD;
          const budget = toM(memberTargets[member] || 0);
          const gap = budget - total;
          const progress = budget ? total / budget : 0;

          const weeksM1 = [calcWeek(m1,1), calcWeek(m1,2), calcWeek(m1,3), calcWeek(m1,4), calcWeek(m1,5)];
          const weeksM2 = [calcWeek(m2,1), calcWeek(m2,2), calcWeek(m2,3), calcWeek(m2,4), calcWeek(m2,5)];
          const weeksM3 = [calcWeek(m3,1), calcWeek(m3,2), calcWeek(m3,3), calcWeek(m3,4), calcWeek(m3,5)];

          rows.push({ team, member, valM1, valM2, valM3, valTBD, total, budget, gap, progress, weeksM1, weeksM2, weeksM3 });
        });
      });

      const sumM1 = rows.reduce((a,b)=>a+b.valM1,0);
      const sumM2 = rows.reduce((a,b)=>a+b.valM2,0);
      const sumM3 = rows.reduce((a,b)=>a+b.valM3,0);
      const sumTotal = rows.reduce((a,b)=>a+b.total,0);

      const currentTargets = quarterTargets[selectedQuarter] || {};
      const sumBudget = toM(currentTargets.target || 0);
      const sumGap = sumBudget - sumTotal;
      const sumProgress = sumBudget ? sumTotal / sumBudget : 0;

      const sumWeeksM1 = [1, 2, 3, 4, 5].map(i => rows.reduce((a,b)=>a+b.weeksM1[i-1], 0));
      const sumWeeksM2 = [1, 2, 3, 4, 5].map(i => rows.reduce((a,b)=>a+b.weeksM2[i-1], 0));
      const sumWeeksM3 = [1, 2, 3, 4, 5].map(i => rows.reduce((a,b)=>a+b.weeksM3[i-1], 0));

      const allProducts = ['GMPP', 'Picoway', 'Cryo7', 'VBP', 'Hand Piece', 'Nordlys', 'Nordlys Mini', 'GMP'];
      const productCounts = {};
      allProducts.forEach(p => productCounts[p] = { count: 0 });
      currentQData.forEach(d => { if(productCounts[d.product]) productCounts[d.product].count += 1; });

      const weekLabels = ['1st w', '2nd w', '3rd w', '4th w', '5th w'];

      return (
        <div className="p-6 md:p-8">
          <LangBtn lang={lang} setLang={setLang} />
          <div className="flex justify-between items-end mb-6 flex-wrap gap-3">
            <div>
              <h1 className="text-2xl font-extrabold text-slate-800">Monthly Sales Progress Check</h1>
              <p className="text-slate-500 text-sm font-bold mt-1">
                Candela Korea - Capital Sales Only
                <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded ml-2">(Unit: M₩)</span>
                <span className="text-slate-400 text-xs ml-2">· {currentUser?.email}</span>
              </p>
            </div>
            <div className="flex gap-3">
              <select value={selectedQuarter} onChange={(e) => setSelectedQuarter(e.target.value)} className="px-4 py-2 border-2 border-slate-400 rounded-lg font-bold outline-none cursor-pointer hover:border-blue-500 transition">
                {quarters.map(q => <option key={q} value={q}>{q}</option>)}
              </select>
              <button onClick={handleLogout} className="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2 rounded-lg font-bold transition">{T.logoutBtn}</button>
              <button onClick={() => window.close()} className="bg-slate-300 hover:bg-slate-400 text-slate-800 px-4 py-2 rounded-lg font-bold transition">{T.closeBtn}</button>
            </div>
          </div>

          <div className="excel-container">
            <table className="excel-table">
              <thead>
                <tr>
                  <th rowSpan="2" className="text-left w-16">Team</th>
                  <th rowSpan="2" className="text-left w-24">Sales Reps</th>
                  <th rowSpan="2">{m1Name}</th>
                  <th rowSpan="2">{m2Name}</th>
                  <th rowSpan="2">{m3Name}</th>
                  <th rowSpan="2" className="bg-yellow">Q Total</th>
                  <th rowSpan="2" className="bg-blue">Q Budget</th>
                  <th rowSpan="2">%</th>
                  <th rowSpan="2" className="bg-red-light text-red">Gap</th>
                  <th colSpan="7" className="header-dark">{m1Name} Progress</th>
                  <th colSpan="7" className="header-dark bg-slate-700">{m2Name} Progress</th>
                  <th colSpan="7" className="header-dark bg-slate-600">{m3Name} Progress</th>
                </tr>
                <tr>
                  {weekLabels.map((label, idx) => (
                    <th key={`m1w${idx}`}>{label}{weekRangesM1[idx] && (<span className="week-date-label">{weekRangesM1[idx]}</span>)}</th>
                  ))}
                  <th className="bg-yellow text-slate-800">Total</th>
                  <th className="bg-blue text-blue-800">Progress</th>
                  {weekLabels.map((label, idx) => (
                    <th key={`m2w${idx}`}>{label}{weekRangesM2[idx] && (<span className="week-date-label">{weekRangesM2[idx]}</span>)}</th>
                  ))}
                  <th className="bg-yellow text-slate-800">Total</th>
                  <th className="bg-blue text-blue-800">Progress</th>
                  {weekLabels.map((label, idx) => (
                    <th key={`m3w${idx}`}>{label}{weekRangesM3[idx] && (<span className="week-date-label">{weekRangesM3[idx]}</span>)}</th>
                  ))}
                  <th className="bg-yellow text-slate-800">Total</th>
                  <th className="bg-blue text-blue-800">Progress</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className="hover:bg-slate-50 transition">
                    <td className="text-left text-slate-500 font-bold">{r.team}</td>
                    <td className="text-left font-bold">{r.member}</td>
                    <td className={r.valM1 ? 'text-slate-800 font-bold' : 'text-slate-300'}>{formatM(r.valM1)}</td>
                    <td className={r.valM2 ? 'text-slate-800 font-bold' : 'text-slate-300'}>{formatM(r.valM2)}</td>
                    <td className={r.valM3 ? 'text-slate-800 font-bold' : 'text-slate-300'}>{formatM(r.valM3)}</td>
                    <td className="bg-yellow font-bold text-blue-700">{formatM(r.total)}</td>
                    <td className="bg-blue">{formatM(r.budget)}</td>
                    <td className="text-blue">{formatP(r.progress)}</td>
                    <td className="bg-red-light text-red">{formatM(r.gap)}</td>

                    {r.weeksM1.map((w, idx) => <td key={'m1'+idx} className={w ? '' : 'text-slate-300'}>{formatM(w)}</td>)}
                    <td className="bg-yellow font-bold">{formatM(r.valM1)}</td>
                    <td className="progress-cell">{formatPct(r.valM1, r.budget)}</td>

                    {r.weeksM2.map((w, idx) => <td key={'m2'+idx} className={w ? '' : 'text-slate-300'}>{formatM(w)}</td>)}
                    <td className="bg-yellow font-bold">{formatM(r.valM2)}</td>
                    <td className="progress-cell">{formatPct(r.valM2, r.budget)}</td>

                    {r.weeksM3.map((w, idx) => <td key={'m3'+idx} className={w ? '' : 'text-slate-300'}>{formatM(w)}</td>)}
                    <td className="bg-yellow font-bold">{formatM(r.valM3)}</td>
                    <td className="progress-cell">{formatPct(r.valM3, r.budget)}</td>
                  </tr>
                ))}

                <tr className="header-dark font-bold text-[13px]">
                  <td colSpan="2" className="text-center">TOTAL</td>
                  <td>{formatM(sumM1)}</td>
                  <td>{formatM(sumM2)}</td>
                  <td>{formatM(sumM3)}</td>
                  <td className="text-yellow-300">{formatM(sumTotal)}</td>
                  <td className="text-blue-300">{formatM(sumBudget)}</td>
                  <td className="text-green-300">{formatP(sumProgress)}</td>
                  <td className="text-red-300">{formatM(sumGap)}</td>

                  {sumWeeksM1.map((w, idx) => <td key={'sm1'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM1)}</td>
                  <td className="text-blue-300">{formatPct(sumM1, sumBudget)}</td>

                  {sumWeeksM2.map((w, idx) => <td key={'sm2'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM2)}</td>
                  <td className="text-blue-300">{formatPct(sumM2, sumBudget)}</td>

                  {sumWeeksM3.map((w, idx) => <td key={'sm3'+idx}>{formatM(w)}</td>)}
                  <td className="text-yellow-300">{formatM(sumM3)}</td>
                  <td className="text-blue-300">{formatPct(sumM3, sumBudget)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div className="excel-container w-full md:w-1/3">
            <table className="excel-table w-full">
              <thead>
                <tr><th colSpan="2" className="header-dark bg-slate-600">System Required (# of unit)</th></tr>
                <tr>
                  <th className="text-left w-1/2">Product</th>
                  <th className="w-1/2">Sales Count</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(productCounts).sort((a,b)=>b[1].count - a[1].count).map(([p, data]) => (
                  <tr key={p}>
                    <td className="text-left font-bold">{p}</td>
                    <td className="font-bold text-blue-600">{data.count > 0 ? `${data.count} ${T.unitSuffix}` : '-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <p className="text-xs text-slate-400 mt-4">
            * 매출 집계 기준: ACT + Pending. (Back up / 미납은 제외)
          </p>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReportApp />);
  </script>
</body>
