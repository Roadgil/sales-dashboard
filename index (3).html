<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영업 납품처 FCST Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <!-- 공통 모듈 (firebase-init.js / common-utils.js / lang.js) -->
  <script src="firebase-init.js"></script>
  <script src="common-utils.js"></script>
  <script src="lang.js"></script>
</head>
<body className="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    // ── 공통 모듈에서 가져오기 ───────────────────────────────────
    // firebase-init.js → window.db, window.auth
    // common-utils.js  → window.AppCommon
    const db   = window.db;
    const auth = window.auth;
    const {
      filterRevenueRows,
      isCountedForRevenue,
      generateId,
      validateSalesEntry,
      showToast,
      safeRun,
      STATUS
    } = window.AppCommon;

    const { useState, useEffect } = React;

    const LangBtn = ({ lang, setLang }) => (
      <button
        onClick={() => { const next = lang==='ko'?'en':'ko'; setLang(next); localStorage.setItem('lang',next); }}
        style={{ position:'fixed', top:'16px', right:'16px', zIndex:9999,
          padding:'6px 14px', borderRadius:'20px', border:'1.5px solid #64748b',
          background:'#1e293b', color:'white', cursor:'pointer', fontWeight:'bold', fontSize:'12px',
          boxShadow:'0 2px 8px rgba(0,0,0,0.3)', display:'flex', alignItems:'center', gap:'6px' }}
      >
        {lang==='ko' ? '🇺🇸 EN' : '🇰🇷 KO'}
      </button>
    );

    const App = () => {
      const [lang, setLang] = useState(localStorage.getItem('lang') || 'ko');
      const [currentUser, setCurrentUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [emailInput, setEmailInput] = useState('');
      const [pwdInput, setPwdInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [authMode, setAuthMode] = useState('login'); // 'login' | 'reset'
      const [resetSent, setResetSent] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      const isLoggedIn = !!currentUser;

      // Firebase Auth 상태 감지
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(user => {
          setCurrentUser(user);
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        try {
          await auth.signInWithEmailAndPassword(emailInput, pwdInput);
        } catch (err) {
          const msg = {
            'auth/user-not-found':  lang==='ko' ? '등록되지 않은 이메일입니다.' : 'Email not registered.',
            'auth/wrong-password':  lang==='ko' ? '비밀번호가 틀렸습니다.' : 'Incorrect password.',
            'auth/invalid-email':   lang==='ko' ? '이메일 형식이 올바르지 않습니다.' : 'Invalid email format.',
            'auth/too-many-requests': lang==='ko' ? '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.' : 'Too many attempts. Please try again later.',
            'auth/invalid-credential': lang==='ko' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : 'Invalid email or password.',
          }[err.code] || (lang==='ko' ? '로그인에 실패했습니다.' : 'Login failed.');
          setAuthError(msg);
        }
      };

      const handleLogout = () => {
        auth.signOut();
      };

      const handlePasswordReset = async (e) => {
        e.preventDefault();
        setAuthError('');
        try {
          await auth.sendPasswordResetEmail(emailInput);
          setResetSent(true);
        } catch (err) {
          const msg = {
            'auth/user-not-found': lang==='ko' ? '등록되지 않은 이메일입니다.' : 'Email not registered.',
            'auth/invalid-email':  lang==='ko' ? '이메일 형식이 올바르지 않습니다.' : 'Invalid email format.',
          }[err.code] || (lang==='ko' ? '오류가 발생했습니다.' : 'An error occurred.');
          setAuthError(msg);
        }
      };

      const T = {
        // Login
        loginTitle:       lang==='ko' ? '영업 납품처 Dashboard'      : 'Sales Delivery Dashboard',
        loginSub:         lang==='ko' ? '접근 권한이 필요합니다. 비밀번호를 입력해주세요.' : 'Access restricted. Please enter your password.',
        loginBtn:         lang==='ko' ? '접속하기'                   : 'Log In',
        wrongPwd:         lang==='ko' ? '비밀번호가 틀렸습니다. 다시 확인해주세요!' : 'Incorrect password. Please try again!',
        noExportData:     lang==='ko' ? '추출할 데이터가 없습니다.'   : 'No data to export.',
        noAccount:        lang==='ko' ? 'Account명(납품처)을 입력해주세요.' : 'Please enter the Account name.',
        noDealer:         lang==='ko' ? 'Dealer Name 항목을 선택해주세요.' : 'Please select a Dealer Name.',
        confirmDelete:    lang==='ko' ? '이 납품 데이터를 정말 삭제하시겠습니까?' : 'Are you sure you want to delete this entry?',
        // 알림 / 에러 메시지
        saveSuccess:      lang==='ko' ? '저장되었습니다.' : 'Saved successfully.',
        saveFail:         lang==='ko' ? '저장에 실패했습니다.' : 'Save failed.',
        updateSuccess:    lang==='ko' ? '업데이트되었습니다.' : 'Updated.',
        deleteSuccess:    lang==='ko' ? '삭제되었습니다.' : 'Deleted.',
        deleteFail:       lang==='ko' ? '삭제에 실패했습니다.' : 'Delete failed.',
        loadFail:         lang==='ko' ? '데이터를 불러오지 못했습니다.' : 'Failed to load data.',
        targetSaveFail:   lang==='ko' ? '목표값 저장에 실패했습니다.' : 'Failed to save target.',
        // Sidebar
        yearSuffix:       lang==='ko' ? '년'      : '',
        addQuarterBtn:    lang==='ko' ? '+ 분기 추가' : '+ Add Quarter',
        execReport:       lang==='ko' ? '📊 대표님 보고용 리포트' : '📊 Executive Report',
        exportCSV:        lang==='ko' ? '엑셀 (CSV) 추출' : 'Export (CSV)',
        logout:           lang==='ko' ? '로그아웃'  : 'Logout',
        // Prompts
        promptTeam:       lang==='ko' ? '추가할 탭 이름을 입력하세요 (예: Team 4)' : 'Enter new tab name (e.g. Team 4)',
        promptMember:     lang==='ko' ? '에 추가할 멤버 이름을 입력하세요'          : ' — Enter new member name',
        promptQuarter:    lang==='ko' ? '추가할 년도와 분기를 입력하세요 (예: 2026 Q3)' : 'Enter year and quarter (e.g. 2026 Q3)',
        promptRename:     lang==='ko' ? '새로운 이름을 입력하세요'                  : 'Enter new name',
        confirmDelMember: lang==='ko' ? '멤버를 삭제하시겠습니까?\n해당 멤버의 데이터는 삭제되지 않습니다.' : 'Delete this member?\nTheir data will NOT be deleted.',
        // Dashboard
        overallTarget:    lang==='ko' ? '🚀 전체 영업 목표 달성 현황' : '🚀 Overall Sales Target Achievement',
        quarterSummary:   lang==='ko' ? '📋 분기 요약 지표 (Summary)' : '📋 Quarter Summary',
        er:               lang==='ko' ? '적용 환율 (ER) ✏️'           : 'Exchange Rate (ER) ✏️',
        targetKRWLabel:   lang==='ko' ? 'Target (KRW) ✏️'            : 'Target (KRW) ✏️',
        targetPlaceholder:lang==='ko' ? '목표 금액 기입'               : 'Enter target amount',
        estimated:        lang==='ko' ? '예상치 (KRW)'                : 'Estimated (KRW)',
        gmppEstimated:    lang==='ko' ? 'GMPP 예상치 (KRW)'           : 'GMPP Estimated (KRW)',
        attainRate:       lang==='ko' ? '% (예상치 달성률)'            : '% (Attainment Rate)',
        salesTypeShare:   lang==='ko' ? '🔄 Sales Type 비중 (Direct vs Indirect)' : '🔄 Sales Type Share (Direct vs Indirect)',
        tabByEquip:       lang==='ko' ? '📊 장비별 전체'              : '📊 By Equipment',
        tabDealer:        lang==='ko' ? '🤝 딜러 (전체)'              : '🤝 Dealers (All)',
        tabMember:        lang==='ko' ? '🧑‍💼 멤버 달성률'              : '🧑‍💼 Member Achievement',
        addTab:           lang==='ko' ? '+ 탭 추가'                   : '+ Add Tab',
        addMember:        lang==='ko' ? '+ 항목 추가'                  : '+ Add Member',
        memberList:       lang==='ko' ? '목록'                        : 'List',
        noMembers:        lang==='ko' ? "등록된 항목이 없습니다. 우측 상단의 '+ 항목 추가' 버튼을 눌러주세요." : "No entries yet. Click '+ Add Member' above.",
        memberSubtitle:   lang==='ko' ? '담당 납품처 및 데이터 관리 →' : 'Delivery & Data Management →',
        rename:           lang==='ko' ? '✏️ 이름 수정'                : '✏️ Rename',
        delete:           lang==='ko' ? '🗑️ 삭제'                    : '🗑️ Delete',
        backBtn:          lang==='ko' ? '뒤로가기 (팀 목록)'           : 'Back (Team List)',
        cumulative:       lang==='ko' ? '🎯 누적 달성 현황 (Pending + ACT)' : '🎯 Cumulative Achievement (Pending + ACT)',
        target100label:   lang==='ko' ? '100% Target (KRW) ✏️ 직접기입' : '100% Target (KRW) ✏️ Manual',
        targetPlaceholder2:lang==='ko'? '목표금액'                    : 'Target Amount',
        editMode:         lang==='ko' ? '✨ 데이터 수정 모드 진행 중...' : '✨ Edit mode in progress...',
        // Form labels
        statusLabel:      lang==='ko' ? '상태 (Status)'              : 'Status',
        contractLabel:    lang==='ko' ? '계약 구분 (Contract Type)'   : 'Contract Type',
        contractDateLabel:lang==='ko' ? '계약일'                       : 'Contract Date',
        deliveryLabel:    lang==='ko' ? '납품예정일'                   : 'Delivery Date',
        selectRequired:   lang==='ko' ? '선택 (필수)'                 : 'Select (Required)',
        accountLabel:     lang==='ko' ? 'Account (병원/납품처명)'      : 'Account (Hospital / Clinic)',
        krwPlaceholder:   lang==='ko' ? '원화 입력 시 달러 자동계산'    : 'Enter KRW, USD auto-calculated',
        saveEdit:         lang==='ko' ? '수정 완료'                   : 'Save Edit',
        saveNew:          lang==='ko' ? '데이터 신규 저장'             : 'Save New',
        cancelEdit:       lang==='ko' ? '수정 취소'                   : 'Cancel Edit',
        // Tables
        deliveryStatus:   lang==='ko' ? '✅ 납품 완료 현황 (ACT)'         : '✅ Delivery Completed (ACT)',
        deliveryDate:     lang==='ko' ? '납품일'                      : 'Del. Date',
        contractDate:     lang==='ko' ? '계약일'                      : 'Cont. Date',
        contract:         lang==='ko' ? '계약'                        : 'Contract',
        actions:          lang==='ko' ? '관리'                        : 'Actions',
        noDelivery:       lang==='ko' ? '등록된 납품 데이터가 없습니다.' : 'No delivery data registered.',
        editBtn:          lang==='ko' ? '수정'                        : 'Edit',
        deleteBtn:        lang==='ko' ? '삭제'                        : 'Del',
        pendingList:      lang==='ko' ? '📋 납품 예정 리스트 (Pending)' : '📋 Pending Delivery List',
        noPending:        lang==='ko' ? '등록된 납품예정 데이터가 없습니다.' : 'No pending delivery data registered.',
        backupList:       lang==='ko' ? '🗂️ Back up 리스트 (매출 미집계)' : '🗂️ Back up List (Excluded from Revenue)',
        noBackup:         lang==='ko' ? '등록된 Back up 데이터가 없습니다.' : 'No back up data registered.',
        minalList:        lang==='ko' ? '🔴 미납 리스트 (매출 미집계)' : '🔴 Unpaid List (Excluded from Revenue)',
        noMinal:          lang==='ko' ? '등록된 미납 데이터가 없습니다.' : 'No unpaid data registered.',
        currentEst:       lang==='ko' ? '현재 누적 예상치'             : 'Current Cumulative Estimate',
        achievement:      lang==='ko' ? '달성률'                      : 'Achievement',
        cases:            lang==='ko' ? '건'                          : 'cs',
        gmppTargetPH:     lang==='ko' ? 'GMPP 목표 기입'              : 'Enter GMPP target',
        erPlaceholder:    lang==='ko' ? '예: 1389'                    : 'e.g. 1389',
      };

      const [quarters, setQuarters] = useState(['2026 Q1', '2026 Q2']);
      const [selectedQuarter, setSelectedQuarter] = useState('2026 Q2');
      
      const [teams, setTeams] = useState({
        'Team 1': ['Kim SH', 'Oh SG'],
        'Team 2': ['Baek SC', 'Lee GR'],
        'Team 3': ['YC lim']
      });
      const [selectedTeam, setSelectedTeam] = useState('Team 1');
      const [selectedMember, setSelectedMember] = useState(null);

      const [activeStatTab, setActiveStatTab] = useState('product'); 

      const [memberTargets, setMemberTargets] = useState({
        'Kim SH': 1500000000, 'Oh SG': 1200000000, 'Baek SC': 1300000000, 'Lee GR': 1000000000, 'YC lim': 1000000000
      });

      const [quarterTargets, setQuarterTargets] = useState({
        '2026 Q1': { target: 0, gmppTarget: 0, er: 1389 },
        '2026 Q2': { target: 7255198319, gmppTarget: 4550036400, er: 1389 }
      });
      const [salesData, setSalesData] = useState([]);

      const initialForm = { status: 'ACT', contractType: '일반', contractDate: '', deliveryDate: '', so: '', account: '', product: 'GMPP', accType: '', priceKRW: '', priceUSD: '', salesType: 'Direct', dealerName: '' };
      const [form, setForm] = useState(initialForm);
      const [editingId, setEditingId] = useState(null);

      const DEFAULT_CARD_ORDER = ['er','targetKRW','targetUSD','incentiveKRW','incentiveUSD','estimatedKRW','estimatedUSD','gapKRW','attainRate','gmppTarget','gmppEstimated','gmppGap'];
      const [cardOrder, setCardOrder] = useState(() => {
        try { const s = localStorage.getItem('summaryCardOrder'); return s ? JSON.parse(s) : DEFAULT_CARD_ORDER; }
        catch { return DEFAULT_CARD_ORDER; }
      });

      // 6가지 컬러 팔레트 정의
      const CARD_PALETTES = {
        slate:  { bg: '#f8fafc', border: '#cbd5e1', title: '#475569', value: '#1e293b', inputBorder: '#94a3b8', label: 'Slate' },
        blue:   { bg: '#eff6ff', border: '#93c5fd', title: '#1d4ed8', value: '#1e3a5f', inputBorder: '#60a5fa', label: 'Blue' },
        green:  { bg: '#f0fdf4', border: '#86efac', title: '#15803d', value: '#14532d', inputBorder: '#4ade80', label: 'Green' },
        yellow: { bg: '#fefce8', border: '#fde047', title: '#a16207', value: '#713f12', inputBorder: '#facc15', label: 'Yellow' },
        purple: { bg: '#faf5ff', border: '#c4b5fd', title: '#6d28d9', value: '#3b0764', inputBorder: '#a78bfa', label: 'Purple' },
        rose:   { bg: '#fff1f2', border: '#fda4af', title: '#be123c', value: '#881337', inputBorder: '#fb7185', label: 'Rose' },
      };
      const DEFAULT_CARD_COLORS = { er:'slate', targetKRW:'blue', targetUSD:'blue', incentiveKRW:'green', incentiveUSD:'green', estimatedKRW:'yellow', estimatedUSD:'yellow', gapKRW:'slate', attainRate:'slate', gmppTarget:'purple', gmppEstimated:'slate', gmppGap:'slate' };
      const [cardColors, setCardColors] = useState(() => {
        try { const s = localStorage.getItem('summaryCardColors'); return s ? JSON.parse(s) : DEFAULT_CARD_COLORS; }
        catch { return DEFAULT_CARD_COLORS; }
      });
      const [colorPickerOpen, setColorPickerOpen] = useState(null);

      const setCardColor = (id, palette) => {
        const next = { ...cardColors, [id]: palette };
        setCardColors(next);
        localStorage.setItem('summaryCardColors', JSON.stringify(next));
        setColorPickerOpen(null);
      };

      useEffect(() => {
        if (!isLoggedIn) return;

        const onErr = (label) => (err) => {
          console.error(`[${label} onSnapshot]`, err);
          showToast(T.loadFail, 'error');
        };

        // 1. 판매 데이터 — 현재 분기로 query 제한 (데이터가 늘어도 가벼움)
        const unsubscribeSales = db.collection("sales")
          .where("quarter", "==", selectedQuarter)
          .onSnapshot(
            (snapshot) => { setSalesData(snapshot.docs.map(doc => doc.data())); },
            onErr('sales')
          );
        // 2. 분기 타겟
        const unsubscribeTargets = db.collection("targets").doc("quarterTargets").onSnapshot(
          (doc) => { if (doc.exists) setQuarterTargets(doc.data()); },
          onErr('quarterTargets')
        );
        // 3. 개인 타겟
        const unsubscribeMemberTargets = db.collection("targets").doc("memberTargets").onSnapshot(
          (doc) => { if (doc.exists) setMemberTargets(doc.data()); },
          onErr('memberTargets')
        );
        // 4. 팀 구조 & 분기 리스트
        const unsubscribeLayout = db.collection("settings").doc("layout").onSnapshot(
          (doc) => {
            if (doc.exists) {
              const data = doc.data();
              if (data.teams) setTeams(data.teams);
              if (data.quarters) setQuarters(data.quarters);
            } else {
              // DB에 없으면 최초 생성
              db.collection("settings").doc("layout").set({ teams, quarters })
                .catch(err => console.error('[layout init]', err));
            }
          },
          onErr('layout')
        );

        return () => {
          unsubscribeSales(); unsubscribeTargets(); unsubscribeMemberTargets(); unsubscribeLayout();
        };
      }, [isLoggedIn, selectedQuarter]);

      const handleSave = async () => {
        // 강화된 검증: status, priceKRW, deliveryDate, salesType, member, quarter 모두 체크
        const v = validateSalesEntry(form, {
          quarter: selectedQuarter,
          team: selectedTeam,
          member: selectedMember
        });
        if (!v.ok) {
          showToast(v.message, 'error');
          return;
        }

        const payload = {
          ...form,
          priceKRW: Number(form.priceKRW) || 0,
          priceUSD: Number(form.priceUSD) || 0,
          // 신규 저장 시 충돌 방지를 위해 UUID 사용 (수정 시는 기존 id 유지)
          id: editingId ? editingId : generateId(),
          quarter: selectedQuarter,
          team: selectedTeam,
          member: selectedMember,
          dealerName: form.dealerName,
          updatedAt: new Date().toISOString()
        };

        const result = await safeRun(
          () => db.collection("sales").doc(payload.id.toString()).set(payload),
          {
            successMsg: editingId ? T.updateSuccess : T.saveSuccess,
            errorMsg:   T.saveFail
          }
        );
        if (result.ok) {
          setEditingId(null);
          setForm(initialForm);
        }
      };

      const deleteSalesData = async (id) => {
        if (!window.confirm(T.confirmDelete)) return;
        await safeRun(
          () => db.collection("sales").doc(id.toString()).delete(),
          { successMsg: T.deleteSuccess, errorMsg: T.deleteFail }
        );
      };

      const handleTargetChange = (field, value) => {
        const val = value === '' ? '' : Number(value);
        const newTargets = {
          ...quarterTargets,
          [selectedQuarter]: { ...quarterTargets[selectedQuarter], [field]: val }
        };
        setQuarterTargets(newTargets);
        // 비동기 저장 + 실패 시 토스트
        db.collection("targets").doc("quarterTargets").set(newTargets)
          .catch(err => {
            console.error('[targets save]', err);
            showToast(T.targetSaveFail, 'error');
          });
      };

      const handleMemberTargetChange = (member, value) => {
        const val = value === '' ? '' : Number(value);
        const newMemberTargets = { ...memberTargets, [member]: val };
        setMemberTargets(newMemberTargets);
        db.collection("targets").doc("memberTargets").set(newMemberTargets)
          .catch(err => {
            console.error('[memberTargets save]', err);
            showToast(T.targetSaveFail, 'error');
          });
      };

      const handleEdit = (data) => {
        setForm(data); setEditingId(data.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // ✨ 팀/멤버/분기 추가 시 DB 연동
      const addTeam = () => {
        const newTeam = prompt(T.promptTeam);
        if (newTeam && !teams[newTeam]) {
          const newTeams = { ...teams, [newTeam]: [] };
          setTeams(newTeams); setSelectedTeam(newTeam); setSelectedMember(null);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });
        }
      };

      const addMember = () => {
        const newMember = prompt(`${selectedTeam}${T.promptMember}`);
        if (newMember && !teams[selectedTeam].includes(newMember)) {
          const newTeams = { ...teams, [selectedTeam]: [...teams[selectedTeam], newMember] };
          setTeams(newTeams); handleMemberTargetChange(newMember, 0);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });
        }
      };

      const editMemberName = (oldName, e) => {
        e.stopPropagation(); 
        const newName = prompt(T.promptRename, oldName);
        if (newName && newName !== oldName && !teams[selectedTeam].includes(newName)) {
          const newTeams = { ...teams };
          newTeams[selectedTeam] = newTeams[selectedTeam].map(m => m === oldName ? newName : m);
          setTeams(newTeams);
          db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });

          const newTargets = { ...memberTargets };
          if (newTargets[oldName] !== undefined) {
            newTargets[newName] = newTargets[oldName];
            delete newTargets[oldName];
            db.collection("targets").doc("memberTargets").set(newTargets);
          }
          salesData.filter(d => d.member === oldName).forEach(d => {
            db.collection("sales").doc(d.id.toString()).update({ member: newName });
          });
        }
      };

      const deleteMember = (memberName, e) => {
        e.stopPropagation();
        if (!window.confirm(`'${memberName}' ${T.confirmDelMember}`)) return;
        const newTeams = { ...teams };
        newTeams[selectedTeam] = newTeams[selectedTeam].filter(m => m !== memberName);
        setTeams(newTeams);
        db.collection("settings").doc("layout").set({ teams: newTeams }, { merge: true });
      };

      const addQuarter = () => {
        const newQuarter = prompt(T.promptQuarter);
        if (newQuarter && !quarters.includes(newQuarter)) {
          const newQuarters = [...quarters, newQuarter].sort();
          setQuarters(newQuarters); handleTargetChange('target', 0); 
          db.collection("settings").doc("layout").set({ quarters: newQuarters }, { merge: true });
        }
      };

      const currentER = quarterTargets[selectedQuarter]?.er || 1389;

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (name === 'priceKRW') {
          const krwValue = value ? parseFloat(value) : 0;
          const usdValue = krwValue ? (krwValue / currentER).toFixed(2) : '';
          setForm({ ...form, priceKRW: value, priceUSD: usdValue });
        } else if (name === 'salesType') {
          setForm({ ...form, [name]: value, dealerName: '' });
        } else {
          setForm({ ...form, [name]: value });
        }
      };

      // CSV Export 옵션 상태
      // scope: 'all' | 'quarter' | 'member'
      // includeBackup: Back up / 미납 포함 여부
      const [exportOptions, setExportOptions] = useState({
        scope: 'quarter',
        includeBackup: false
      });
      const [exportPanelOpen, setExportPanelOpen] = useState(false);

      const exportToCSV = (opts) => {
        const o = opts || exportOptions;
        if (!salesData || salesData.length === 0) {
          showToast(T.noExportData, 'error');
          return;
        }

        // 1) scope 필터
        let filtered = salesData.slice();
        if (o.scope === 'quarter') {
          filtered = filtered.filter(d => d.quarter === selectedQuarter);
        } else if (o.scope === 'member') {
          filtered = filtered.filter(d => d.quarter === selectedQuarter && d.member === selectedMember);
        }

        // 2) Back up / 미납 포함 여부
        if (!o.includeBackup) {
          filtered = filtered.filter(d => d.status === 'ACT' || d.status === 'Pending');
        }

        if (filtered.length === 0) {
          showToast(T.noExportData, 'error');
          return;
        }

        const headers = ['Quarter', 'Team', 'Member', 'Status', 'Contract Type', 'Contract Date', 'Delivery Date', 'Sales Type', 'Dealer Name', 'SO', 'Account', 'Product', 'Acc Type', 'Price(KRW)', 'Price(USD)'];
        const rows = filtered.map(d => [d.quarter, d.team, d.member, d.status, d.contractType, d.contractDate, d.deliveryDate, d.salesType, d.dealerName, d.so, d.account, d.product, d.accType, d.priceKRW, d.priceUSD]);
        const csvContent = [headers.join(','), ...rows.map(row => row.map(cell => `"${String(cell == null ? '' : cell).replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url;
        const today = new Date().toISOString().slice(0,10);
        const scopeTag = o.scope === 'all' ? 'ALL' : (o.scope === 'member' ? `${selectedMember}` : selectedQuarter.replace(/\s+/g,'_'));
        const backupTag = o.includeBackup ? 'with-backup' : 'ACT-Pending';
        link.setAttribute('download', `Sales_${scopeTag}_${backupTag}_${today}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast(`CSV ${filtered.length}건 내보내기 완료`, 'success');
        setExportPanelOpen(false);
      };

      const moveCard = (idx, dir) => {
        const next = [...cardOrder];
        const to = idx + dir;
        if (to < 0 || to >= next.length) return;
        [next[idx], next[to]] = [next[to], next[idx]];
        setCardOrder(next);
        localStorage.setItem('summaryCardOrder', JSON.stringify(next));
      };

      const [dragOverIdx, setDragOverIdx] = useState(null);

      const handleDragStart = (e, idx) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
      };

      const handleDragOver = (e, idx) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverIdx(idx);
      };

      const handleDrop = (e, toIdx) => {
        e.preventDefault();
        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
        if (fromIdx === toIdx) { setDragOverIdx(null); return; }
        const next = [...cardOrder];
        const [moved] = next.splice(fromIdx, 1);
        next.splice(toIdx, 0, moved);
        setCardOrder(next);
        localStorage.setItem('summaryCardOrder', JSON.stringify(next));
        setDragOverIdx(null);
      };

      const handleDragEnd = () => setDragOverIdx(null);

      // ─── Row order for ACT / Pending / Backup tables ───────────────────
      const [rowOrders, setRowOrders] = useState({ ACT: {}, Pending: {}, Backup: {}, Minal: {} });
      const [rowDragState, setRowDragState] = useState({ type: null, fromId: null, overId: null });

      useEffect(() => {
        if (!isLoggedIn) return;
        const unsub = db.collection("settings").doc("rowOrders").onSnapshot(doc => {
          if (doc.exists) setRowOrders(doc.data());
        });
        return () => unsub();
      }, [isLoggedIn]);

      const saveRowOrders = (next) => {
        setRowOrders(next);
        db.collection("settings").doc("rowOrders").set(next);
      };

      const getOrderedRows = (status, rawRows) => {
        const key = `${selectedQuarter}__${selectedMember}__${status}`;
        const orderMap = rowOrders[status] && rowOrders[status][key];
        if (!orderMap || orderMap.length === 0) return rawRows;
        const idOrder = orderMap;
        const mapped = {};
        rawRows.forEach(r => { mapped[String(r.id)] = r; });
        const ordered = idOrder.map(id => mapped[id]).filter(Boolean);
        const rest = rawRows.filter(r => !idOrder.includes(String(r.id)));
        return [...ordered, ...rest];
      };

      const handleRowDragStart = (e, status, rowId) => {
        e.dataTransfer.effectAllowed = 'move';
        setRowDragState({ type: status, fromId: String(rowId), overId: null });
      };

      const handleRowDragOver = (e, status, rowId) => {
        e.preventDefault();
        if (rowDragState.type !== status) return;
        setRowDragState(s => ({ ...s, overId: String(rowId) }));
      };

      const handleRowDrop = (e, status, toRowId, rawRows) => {
        e.preventDefault();
        const { fromId } = rowDragState;
        const toId = String(toRowId);
        if (!fromId || fromId === toId) { setRowDragState({ type: null, fromId: null, overId: null }); return; }
        const key = `${selectedQuarter}__${selectedMember}__${status}`;
        const currentOrder = (rowOrders[status] && rowOrders[status][key]) || rawRows.map(r => String(r.id));
        const fromIdx = currentOrder.indexOf(fromId);
        const toIdx = currentOrder.indexOf(toId);
        if (fromIdx === -1 || toIdx === -1) { setRowDragState({ type: null, fromId: null, overId: null }); return; }
        const next = [...currentOrder];
        next.splice(fromIdx, 1);
        next.splice(toIdx, 0, fromId);
        const nextOrders = { ...rowOrders, [status]: { ...(rowOrders[status] || {}), [key]: next } };
        saveRowOrders(nextOrders);
        setRowDragState({ type: null, fromId: null, overId: null });
      };

      const handleRowDragEnd = () => setRowDragState({ type: null, fromId: null, overId: null });

      const groupedQuarters = quarters.reduce((acc, q) => {
        const [year, quarter] = q.split(' '); 
        if (!acc[year]) acc[year] = [];
        acc[year].push(quarter);
        return acc;
      }, {});

      if (authLoading) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-800">
            <div className="text-white text-lg font-semibold animate-pulse">Loading...</div>
          </div>
        );
      }

      if (!isLoggedIn) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-800 font-sans px-4">
            <LangBtn lang={lang} setLang={setLang} />
            <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
              <div className="text-4xl mb-4">📊</div>
              <h2 className="text-2xl font-extrabold text-slate-800 mb-2">{T.loginTitle}</h2>

              {authMode === 'login' ? (
                <>
                  <p className="text-slate-500 text-sm mb-6">{lang==='ko' ? '이메일과 비밀번호로 로그인하세요.' : 'Sign in with your email and password.'}</p>
                  <form onSubmit={handleLogin} className="flex flex-col space-y-3 text-left">
                    <div>
                      <label className="text-xs font-semibold text-slate-500 mb-1 block">{lang==='ko' ? '이메일' : 'Email'}</label>
                      <input
                        type="email" value={emailInput} onChange={e => setEmailInput(e.target.value)}
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        placeholder="example@company.com" autoFocus required
                      />
                    </div>
                    <div>
                      <label className="text-xs font-semibold text-slate-500 mb-1 block">{lang==='ko' ? '비밀번호' : 'Password'}</label>
                      <input
                        type="password" value={pwdInput} onChange={e => setPwdInput(e.target.value)}
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        placeholder="••••••••" required
                      />
                    </div>
                    {authError && <p className="text-red-500 text-xs font-medium pt-1">{authError}</p>}
                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200 mt-2">
                      {lang==='ko' ? '로그인' : 'Log In'}
                    </button>
                  </form>
                  <button
                    onClick={() => { setAuthMode('reset'); setAuthError(''); setResetSent(false); }}
                    className="mt-4 text-xs text-slate-400 hover:text-blue-500 underline transition"
                  >
                    {lang==='ko' ? '비밀번호를 잊으셨나요?' : 'Forgot your password?'}
                  </button>
                </>
              ) : (
                <>
                  <p className="text-slate-500 text-sm mb-6">{lang==='ko' ? '가입한 이메일을 입력하면 재설정 링크를 보내드려요.' : 'Enter your email to receive a password reset link.'}</p>
                  {resetSent ? (
                    <div className="bg-green-50 border border-green-200 rounded-lg p-4 text-green-700 text-sm font-medium">
                      {lang==='ko' ? '✅ 재설정 이메일을 발송했습니다. 메일함을 확인해주세요.' : '✅ Reset email sent. Please check your inbox.'}
                    </div>
                  ) : (
                    <form onSubmit={handlePasswordReset} className="flex flex-col space-y-3 text-left">
                      <div>
                        <label className="text-xs font-semibold text-slate-500 mb-1 block">{lang==='ko' ? '이메일' : 'Email'}</label>
                        <input
                          type="email" value={emailInput} onChange={e => setEmailInput(e.target.value)}
                          className="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                          placeholder="example@company.com" autoFocus required
                        />
                      </div>
                      {authError && <p className="text-red-500 text-xs font-medium pt-1">{authError}</p>}
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">
                        {lang==='ko' ? '재설정 메일 보내기' : 'Send Reset Email'}
                      </button>
                    </form>
                  )}
                  <button
                    onClick={() => { setAuthMode('login'); setAuthError(''); }}
                    className="mt-4 text-xs text-slate-400 hover:text-blue-500 underline transition"
                  >
                    {lang==='ko' ? '← 로그인으로 돌아가기' : '← Back to Login'}
                  </button>
                </>
              )}
            </div>
          </div>
        );
      }

      const currentQData = salesData.filter(d => d.quarter === selectedQuarter);
      const currentTargets = quarterTargets[selectedQuarter] || { target: 0, gmppTarget: 0, er: 1389 };
      const targetKRW = currentTargets.target || 0;
      const gmppTargetKRW = currentTargets.gmppTarget || 0;
      const activeER = currentTargets.er || 1389;

      const targetUSD = targetKRW / activeER;
      const incentiveTargetKRW = targetKRW / 1.2;
      const incentiveTargetUSD = targetUSD / 1.2;

      // ★★★ 매출 집계 기준 통일: ACT + Pending 만 (Back up / 미납 제외)
      // common-utils.js의 filterRevenueRows() 사용 — report.html / dashboard_26.html 과 동일.
      const expectedData = filterRevenueRows(currentQData);
      const expectedKRW = expectedData.reduce((acc, cur) => acc + cur.priceKRW, 0);
      const expectedUSD = expectedKRW / activeER;

      const percent = targetKRW ? (expectedKRW / targetKRW) * 100 : 0;
      const gapKRW = targetKRW - expectedKRW;

      const gmppExpectedKRW = expectedData.filter(d => d.product === 'GMPP').reduce((acc, cur) => acc + cur.priceKRW, 0);
      const gmppGapKRW = gmppTargetKRW - gmppExpectedKRW;

      const memberActFcstData = selectedMember ? expectedData.filter(d => d.member === selectedMember) : [];
      const memberACT = memberActFcstData.reduce((acc, cur) => acc + cur.priceKRW, 0);

      const directKRW = expectedData.filter(d => d.salesType === 'Direct').reduce((acc, cur) => acc + cur.priceKRW, 0);
      const indirectKRW = expectedData.filter(d => d.salesType === 'Indirect').reduce((acc, cur) => acc + cur.priceKRW, 0);
      const directPer = expectedKRW > 0 ? (directKRW / expectedKRW) * 100 : 0;
      const indirectPer = expectedKRW > 0 ? (indirectKRW / expectedKRW) * 100 : 0;
      
      const allProducts = ['GMPP', 'Picoway', 'Cryo7', 'VBP', 'Hand Piece', 'Nordlys', 'Nordlys Mini', 'GMP'];
      const productStats = {};
      allProducts.forEach(p => productStats[p] = { count: 0, sumKRW: 0 });
      expectedData.forEach(cur => { if (productStats[cur.product]) { productStats[cur.product].count += 1; productStats[cur.product].sumKRW += cur.priceKRW; }});

      const ALL_INDIRECT_DEALERS = ['SEVEN U', 'Innomed', 'TMI', '알펙스메디', '동안기획', 'Bori', 'Beauko', '엠디마케팅', '티모티', '엘룩스코리아', 'seed group', 'Human', '기타'];
      const allDealers = ['병원', ...ALL_INDIRECT_DEALERS];

      // 딜러 통계: 데이터에 있는 딜러는 목록 외라도 모두 동적 집계
      const dealerIndirectStats = {};
      ALL_INDIRECT_DEALERS.forEach(d => dealerIndirectStats[d] = { count: 0, sumKRW: 0 });
      expectedData.filter(d => d.salesType === 'Indirect').forEach(cur => {
        const dealer = cur.dealerName || '기타';
        if (!dealerIndirectStats[dealer]) dealerIndirectStats[dealer] = { count: 0, sumKRW: 0 };
        dealerIndirectStats[dealer].count += 1; dealerIndirectStats[dealer].sumKRW += cur.priceKRW;
      });

      const dealerDirectStats = { '병원': { count: 0, sumKRW: 0 } };
      expectedData.filter(d => d.salesType === 'Direct').forEach(cur => {
        const dealer = cur.dealerName || '병원';
        if (!dealerDirectStats[dealer]) dealerDirectStats[dealer] = { count: 0, sumKRW: 0 };
        dealerDirectStats[dealer].count += 1; dealerDirectStats[dealer].sumKRW += cur.priceKRW;
      });

      // 전체 딜러 통계 (Direct + Indirect 합산, 데이터 기반 동적 생성)
      const dealerAllStats = {};
      allDealers.forEach(d => dealerAllStats[d] = { count: 0, sumKRW: 0 });
      expectedData.forEach(cur => {
        const dealer = cur.dealerName || (cur.salesType === 'Direct' ? '병원' : '기타');
        if (!dealerAllStats[dealer]) dealerAllStats[dealer] = { count: 0, sumKRW: 0 };
        dealerAllStats[dealer].count += 1; dealerAllStats[dealer].sumKRW += cur.priceKRW;
      });

      const allMembers = Object.values(teams).flat();
      const memberStats = {};
      allMembers.forEach(m => memberStats[m] = { count: 0, sumKRW: 0 });
      expectedData.forEach(cur => { const mem = cur.member; if (memberStats[mem]) { memberStats[mem].count += 1; memberStats[mem].sumKRW += cur.priceKRW; }});

      const renderProgressBar = (actKRW, targetKRW) => {
        if (!targetKRW) return null;
        const target120 = targetKRW * 1.2;
        const target140 = targetKRW * 1.4;
        const target150 = targetKRW * 1.5;
        const per = (actKRW / targetKRW) * 100;
        const maxScale = Math.max(target150, actKRW * 1.05); 
        return (
          <div className="w-full mt-6 md:mt-8">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 md:mb-8 relative">
              <span className="text-sm font-bold text-gray-600 mb-2 md:mb-0">{T.currentEst}: ₩ {actKRW.toLocaleString()}</span>
              <span className={`text-lg font-extrabold ${per >= 100 ? 'text-green-600' : 'text-blue-600'}`}>{T.achievement}: {per.toFixed(1)}%</span>
              <div className="hidden md:block absolute w-full -bottom-6 left-0 h-5">
                <div className="absolute -translate-x-1/2 text-xs font-bold text-gray-500" style={{ left: `${(targetKRW / maxScale) * 100}%` }}>100%</div>
                <div className="absolute -translate-x-1/2 text-xs font-bold text-green-600" style={{ left: `${(target120 / maxScale) * 100}%` }}>120%</div>
                <div className="absolute -translate-x-1/2 text-xs font-bold text-purple-600" style={{ left: `${(target140 / maxScale) * 100}%` }}>140%</div>
                <div className="absolute -translate-x-1/2 text-xs font-bold text-orange-500" style={{ left: `${(target150 / maxScale) * 100}%` }}>150%</div>
              </div>
            </div>
            <div className="relative w-full h-6 md:h-8 bg-gray-200 rounded-full overflow-hidden shadow-inner border border-gray-300">
              <div className={`h-full transition-all duration-1000 ease-out flex items-center justify-end pr-3 text-white font-bold text-xs md:text-sm ${per >= 100 ? 'bg-green-500' : 'bg-blue-500'}`} style={{ width: `${(actKRW / maxScale) * 100}%` }}>{per > 5 && `${per.toFixed(1)}%`}</div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-gray-500" style={{ left: `${(targetKRW / maxScale) * 100}%` }}></div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-green-300" style={{ left: `${(target120 / maxScale) * 100}%` }}></div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-purple-300" style={{ left: `${(target140 / maxScale) * 100}%` }}></div>
              <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-orange-400" style={{ left: `${(target150 / maxScale) * 100}%` }}></div>
            </div>
          </div>
        );
      };

      const renderBarChart = (dataObj, colorClass) => {
        const dataArr = Object.entries(dataObj).sort((a, b) => b[1].sumKRW - a[1].sumKRW);
        const maxVal = Math.max(...dataArr.map(d => d[1].sumKRW), 1);
        return (
          <div className="space-y-4">
            {dataArr.map(([key, stat]) => {
              const per = maxVal === 0 ? 0 : (stat.sumKRW / maxVal) * 100;
              return (
                <div key={key} className="flex flex-col">
                  <div className="flex justify-between items-end mb-1 text-xs md:text-sm">
                    <span className="font-bold text-gray-800">{key} <span className="text-gray-400 font-normal ml-1">({stat.count}{T.cases})</span></span>
                    <span className="font-mono font-bold text-gray-700 text-[13px] md:text-[15px]">₩ {stat.sumKRW.toLocaleString()}</span>
                  </div>
                  <div className="w-full bg-gray-100 h-2 md:h-3 rounded-full overflow-hidden shadow-inner flex"><div className={`${colorClass} h-full rounded-full transition-all duration-1000`} style={{ width: `${per}%` }}></div></div>
                </div>
              );
            })}
          </div>
        );
      };

      const renderMemberChart = (dataObj, targetsObj, colorClass) => {
        const dataArr = Object.entries(dataObj).sort((a, b) => b[1].sumKRW - a[1].sumKRW);
        return (
          <div className="space-y-5">
            {dataArr.map(([key, stat]) => {
              const target = targetsObj[key] || 0;
              const per = target === 0 ? 0 : (stat.sumKRW / target) * 100;
              return (
                <div key={key} className="flex flex-col">
                  <div className="flex justify-between items-end mb-1 text-xs md:text-sm">
                    <span className="font-bold text-gray-800">{key} <span className="text-gray-400 font-normal ml-1">({stat.count}{T.cases})</span></span>
                    <div className="text-right flex flex-col">
                      <span className="font-mono font-bold text-gray-800 text-[13px] md:text-[15px]">₩ {stat.sumKRW.toLocaleString()} {target > 0 && <span className={`${per >= 100 ? 'text-green-600' : 'text-emerald-600'} text-[10px] md:text-[12px] ml-1`}>({per.toFixed(1)}%)</span>}</span>
                      {target > 0 && <span className="font-mono text-gray-400 text-[9px] md:text-[10px]">Target: ₩ {target.toLocaleString()}</span>}
                    </div>
                  </div>
                  <div className="w-full bg-gray-100 h-2 md:h-3 rounded-full overflow-hidden shadow-inner flex"><div className={`${colorClass} h-full rounded-full transition-all duration-1000`} style={{ width: `${per > 100 ? 100 : per}%` }}></div></div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="flex flex-col md:flex-row h-screen font-sans">
          <LangBtn lang={lang} setLang={setLang} />
          <div className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-20">
            <h2 className="text-lg font-bold text-blue-400">📊 FCST Dashboard</h2>
            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-2xl focus:outline-none">{isSidebarOpen ? '✕' : '☰'}</button>

                                onDragStart={e => handleRowDragStart(e, 'Minal', row.id)}
                                onDragOver={e => handleRowDragOver(e, 'Minal', row.id)}
                                onDrop={e => handleRowDrop(e, 'Minal', row.id, rawRows)}
                                onDragEnd={handleRowDragEnd}
                                className={`border-b bg-red-50 hover:bg-red-100 transition cursor-grab active:cursor-grabbing ${rowDragState.type==='Minal' && rowDragState.overId===String(row.id) ? 'outline outline-2 outline-red-400 opacity-70' : ''}`}>
                                <td className="p-2 md:p-3 font-bold text-red-600 select-none">
                                  <span className="inline-block mr-1 text-gray-300 cursor-grab" title="드래그하여 순서 변경">⠿</span>
                                  {row.status}
                                </td>
                                <td className="p-2 md:p-3 text-gray-600">{row.contractDate || '-'}</td>
                                <td className="p-2 md:p-3 text-gray-600">{row.deliveryDate || '-'}</td>
                                <td className="p-2 md:p-3 font-semibold text-emerald-600">{row.contractType || '일반'}</td>
                                <td className="p-2 md:p-3 font-semibold"><span className={`px-2 py-1 rounded text-[10px] md:text-xs ${row.salesType === 'Direct' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>{row.salesType}</span></td>
                                <td className="p-2 md:p-3 font-bold text-purple-700">{row.dealerName || '-'}</td>
                                <td className="p-2 md:p-3 font-mono text-gray-500">{row.so || '-'}</td>
                                <td className="p-2 md:p-3 font-bold text-gray-800">{row.account}</td>
                                <td className="p-2 md:p-3">{row.product}</td>
                                <td className="p-2 md:p-3 text-gray-500">{row.accType}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">₩ {row.priceKRW.toLocaleString()}</td>
                                <td className="p-2 md:p-3 text-right font-mono text-gray-700">$ {row.priceUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                <td className="p-2 md:p-3 text-center space-x-1"><button onClick={() => handleEdit(row)} className="text-[10px] md:text-xs bg-red-200 hover:bg-red-300 text-red-800 px-2 py-1 rounded font-bold transition">{T.editBtn}</button><button onClick={() => deleteSalesData(row.id)} className="text-[10px] md:text-xs bg-red-100 hover:bg-red-200 text-red-600 px-2 py-1 rounded font-bold transition">{T.deleteBtn}</button></td>
                              </tr>
                            ));
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</body>
</html>
